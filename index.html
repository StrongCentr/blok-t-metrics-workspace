<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пирамида метрик — управленческий workspace</title>
<style>
:root {
  --bg: #0b0d11;
  --bg-elevated: #12151c;
  --bg-card: #171b26;
  --bg-hover: #1d2330;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.13);
  --text: #eceef3;
  --text-secondary: #939aad;
  --text-muted: #5e657a;
  --accent: #5a9de0;
  --accent-soft: #9ec8ef;
  --accent-dim: rgba(90,157,224,0.14);
  --positive: #45a87a;
  --positive-dim: rgba(69,168,122,0.14);
  --l4-bg: #1a2235;
  --l3-bg: #171d2a;
  --l2-bg: #141820;
  --l1-bg: #111418;
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.32);
  --shadow-inset: inset 0 1px 0 rgba(255,255,255,0.04);
  --font: "Segoe UI", system-ui, -apple-system, sans-serif;
  --font-mono: "Cascadia Code", "Consolas", monospace;
  --header-h: 64px;
  --passport-w: 420px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: var(--font);
  background: linear-gradient(165deg, #0a0c10 0%, #0e1118 40%, #0c0e14 100%);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.45;
  overflow-x: hidden;
}
.app { display: flex; flex-direction: column; min-height: 100vh; }
.header {
  position: sticky; top: 0; z-index: 100;
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: var(--space-md);
  padding: var(--space-sm) var(--space-lg);
  min-height: var(--header-h);
  background: rgba(11,13,17,0.94);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(14px);
}
.header-brand {
  font-size: 0.82rem; font-weight: 600; letter-spacing: -0.02em;
  color: var(--text); white-space: nowrap;
}
.header-main {
  display: flex; align-items: center; gap: var(--space-sm);
  flex-wrap: wrap; min-width: 0;
}
.header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.header-btn {
  padding: 7px 12px; font-size: 0.72rem; font-family: inherit; font-weight: 500;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-card); color: var(--text-secondary); cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.header-btn:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border-strong); }
.header-btn.primary { background: var(--accent-dim); color: var(--accent-soft); border-color: rgba(90,157,224,0.35); }
.header-btn.primary:hover { background: rgba(90,157,224,0.22); color: #c5dff5; }
.breadcrumb { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; font-size: 0.78rem; min-width: 0; }
.breadcrumb span { color: var(--text-muted); }
.breadcrumb .crumb {
  color: var(--text-secondary); background: none; border: none; padding: 0;
  font: inherit; cursor: default;
}
.breadcrumb .crumb.is-link {
  cursor: pointer; text-decoration: underline; text-underline-offset: 2px;
  text-decoration-color: rgba(255,255,255,0.2);
}
.breadcrumb .crumb.is-link:hover { color: var(--text); text-decoration-color: var(--accent-soft); }
.breadcrumb .crumb.is-current { color: var(--text); font-weight: 500; cursor: default; text-decoration: none; }
.breadcrumb .sep { color: var(--text-muted); user-select: none; opacity: 0.6; }
.metric-crumb {
  padding: 3px 10px; border-radius: 20px;
  background: var(--accent-dim); color: var(--accent); font-size: 0.75rem; font-weight: 500;
  max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.main {
  display: grid;
  grid-template-columns: 260px 1fr 300px;
  gap: var(--space-md);
  padding: var(--space-md) var(--space-lg);
  flex: 1;
  align-items: start;
}
.panel {
  background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 48%), var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow), var(--shadow-inset);
  overflow: hidden;
}
.panel-head {
  padding: var(--space-md);
  border-bottom: 1px solid var(--border);
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-muted);
}
.pyramid-panel-head {
  display: flex; align-items: center; justify-content: flex-start; gap: var(--space-md);
}
.pyramid-panel-head-left {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap; min-width: 0;
}
.pyramid-panel-head .panel-head-title { text-transform: none; letter-spacing: -0.02em; font-size: 0.82rem; color: var(--text); font-weight: 600; }
.pyramid-panel-toggle {
  flex-shrink: 0; padding: 6px 12px; font-size: 0.72rem; font-family: inherit; font-weight: 600;
  text-transform: none; letter-spacing: 0;
  border: 1px solid rgba(74,143,212,0.45); border-radius: var(--radius-sm);
  background: var(--accent-dim); color: var(--accent); cursor: pointer;
}
.pyramid-panel-toggle:hover { background: rgba(74,143,212,0.28); }
.pyramid-panel-toggle.is-back { background: transparent; color: var(--text-secondary); border-color: var(--border); }
.pyramid-panel-toggle.is-back:hover { color: var(--text); border-color: var(--border-strong); }
.panel-body { padding: var(--space-sm); }
.col-tree .panel-body { max-height: calc(100vh - var(--header-h) - 120px); overflow-y: auto; }
.tree-branch { margin-bottom: 2px; }
.tree-row {
  display: flex; align-items: flex-start; gap: 0; width: 100%;
}
.tree-toggle, .tree-toggle-spacer {
  flex-shrink: 0; width: 24px; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.tree-toggle {
  border: none; background: transparent; color: var(--text-muted);
  cursor: pointer; font-size: 0.65rem; padding: 0; border-radius: 4px;
  transition: transform 0.15s ease, color 0.15s;
}
.tree-toggle:hover { color: var(--text); background: var(--bg-hover); }
.tree-toggle.collapsed { transform: rotate(-90deg); }
.tree-children {
  margin-left: 11px; padding-left: 8px;
  border-left: 1px solid var(--border);
}
.tree-node {
  display: block; flex: 1; min-width: 0; text-align: left;
  padding: 8px 10px; margin-bottom: 0;
  border: 1px solid transparent; border-radius: var(--radius-md);
  background: transparent; color: var(--text); cursor: pointer;
  font-family: inherit; transition: background 0.15s, border-color 0.15s;
}
.tree-node:hover { background: var(--bg-hover); border-color: var(--border); }
.tree-node.active {
  background: var(--accent-dim); border-color: rgba(74,143,212,0.35);
}
.tree-node .node-title { font-size: 0.88rem; font-weight: 500; display: block; line-height: 1.35; }
.col-pyramid .panel-body { max-height: calc(100vh - var(--header-h) - 100px); overflow-y: auto; }
.pyramid-intro {
  padding: var(--space-md); margin-bottom: var(--space-md);
  background: linear-gradient(165deg, rgba(255,255,255,0.03) 0%, transparent 50%), var(--bg-card);
  border-radius: var(--radius-md);
  border: 1px solid var(--border); box-shadow: var(--shadow-inset);
}
.pyramid-intro-main { flex: 1; min-width: 0; }
.pyramid-intro h2 { font-size: 1.15rem; font-weight: 600; margin-bottom: 6px; }
.pyramid-intro-text { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.5; }
.pyramid-intro-text .intro-owner { display: block; margin-top: 6px; color: var(--text-muted); }
.level-block { margin-bottom: var(--space-md); border-radius: var(--radius-md); overflow: hidden; }
.product-desc-view { padding: 0 var(--space-sm) var(--space-md); }
.product-desc-head {
  padding: var(--space-md); margin-bottom: var(--space-md);
  background: linear-gradient(165deg, rgba(255,255,255,0.03) 0%, transparent 50%), var(--bg-card);
  border-radius: var(--radius-md);
  border: 1px solid var(--border); box-shadow: var(--shadow-inset);
}
.product-desc-head h2 { font-size: 1.15rem; font-weight: 600; margin-top: 8px; }
.product-desc-section {
  margin-top: var(--space-md); padding: var(--space-md) var(--space-md) var(--space-lg);
  background: linear-gradient(165deg, rgba(255,255,255,0.025) 0%, transparent 55%), var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius-md);
  box-shadow: var(--shadow-inset);
}
.product-desc-section h3 {
  font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: var(--space-md);
}
.brief-section { margin-bottom: var(--space-md); }
.brief-section:last-child { margin-bottom: 0; }
.brief-section label {
  display: block; font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px;
}
.brief-section .val { font-size: 0.88rem; line-height: 1.5; color: var(--text-secondary); }
.lifecycle-pill {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  background: var(--positive-dim); color: var(--positive); font-size: 0.8rem; font-weight: 600;
}
.artifact-list { list-style: none; }
.artifact-item {
  padding: 12px 0; border-bottom: 1px solid var(--border);
  font-size: 0.82rem; line-height: 1.45;
}
.artifact-item:last-child { border-bottom: none; padding-bottom: 0; }
.artifact-item .art-title { font-weight: 500; color: var(--text); display: block; line-height: 1.4; }
.artifact-item .art-meta { font-size: 0.72rem; color: var(--text-muted); margin-top: 5px; display: block; }
.art-metric {
  display: inline-block; margin-top: 8px; padding: 4px 11px;
  border-radius: 999px; font-size: 0.72rem; font-weight: 500; line-height: 1.35;
  background: rgba(90,157,224,0.1); color: var(--accent-soft);
  border: 1px solid rgba(90,157,224,0.26);
  cursor: pointer; font-family: inherit; text-align: left;
  appearance: none; -webkit-appearance: none;
  transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
}
.art-metric:hover {
  background: rgba(90,157,224,0.18); border-color: rgba(90,157,224,0.42);
  color: #c5dff5; box-shadow: 0 0 0 1px rgba(90,157,224,0.12);
}
.art-metric:focus-visible {
  outline: 2px solid rgba(90,157,224,0.45); outline-offset: 2px;
}
.art-status {
  display: inline-block; vertical-align: middle;
  padding: 2px 8px; border-radius: 999px; font-size: 0.66rem; font-weight: 500;
  margin-left: 8px; letter-spacing: 0.01em;
}
.art-status.planned { background: rgba(255,255,255,0.05); color: var(--text-muted); }
.art-status.progress { background: rgba(90,157,224,0.14); color: var(--accent-soft); }
.art-status.done { background: var(--positive-dim); color: var(--positive); }
.task-epic-list { list-style: none; }
.task-epic {
  padding: 14px 0; border-bottom: 1px solid var(--border);
}
.task-epic:last-child { border-bottom: none; padding-bottom: 0; }
.task-epic-head { margin-bottom: 2px; }
.task-epic-type, .task-feature-type {
  display: inline-block; font-size: 0.62rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--accent-soft); margin-right: 8px;
  padding: 2px 7px; border-radius: 4px;
  background: rgba(90,157,224,0.1); border: 1px solid rgba(90,157,224,0.18);
}
.task-feature-type {
  color: var(--text-muted); background: rgba(255,255,255,0.04);
  border-color: var(--border);
}
.task-features {
  list-style: none; margin: 10px 0 0 10px; padding: 8px 0 4px 14px;
  border-left: 1px solid rgba(90,157,224,0.22);
}
.task-feature {
  padding: 10px 0; font-size: 0.8rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.task-feature:last-child { border-bottom: none; padding-bottom: 0; }
.art-metric-row {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px 8px;
  margin-top: 8px;
}
.art-metric-row .art-metric { margin-top: 0; }
.art-metric-note {
  font-size: 0.68rem; color: var(--text-muted); line-height: 1.35;
}
.level-block[data-level="4"] { border: 1px solid rgba(74,143,212,0.25); }
.level-block[data-level="3"] { border: 1px solid var(--border-strong); }
.level-block[data-level="2"] { border: 1px solid var(--border); }
.level-block[data-level="1"] { border: 1px solid var(--border); opacity: 0.95; }
.level-header {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 12px 14px; font-weight: 600;
}
.level-block[data-level="4"] .level-header { background: var(--l4-bg); font-size: 0.95rem; }
.level-block[data-level="3"] .level-header { background: var(--l3-bg); font-size: 0.9rem; }
.level-block[data-level="2"] .level-header { background: var(--l2-bg); font-size: 0.85rem; }
.level-block[data-level="1"] .level-header { background: var(--l1-bg); font-size: 0.82rem; color: var(--text-secondary); }
.level-label { letter-spacing: 0.04em; }
.level-tagline { font-size: 0.68rem; font-weight: 400; color: var(--text-muted); max-width: 52%; text-align: right; line-height: 1.35; }
.level-hint {
  padding: 8px 14px 10px; font-size: 0.72rem; line-height: 1.45;
  color: var(--text-muted); background: var(--bg-card);
  border-bottom: 1px solid var(--border);
}
.pyramid-hint {
  margin: 0 var(--space-sm) var(--space-md); padding: 10px 14px;
  font-size: 0.78rem; line-height: 1.45; color: var(--text-secondary);
  background: rgba(90,157,224,0.08); border: 1px solid rgba(90,157,224,0.18);
  border-radius: var(--radius-md);
}
.pyramid-hint strong { color: var(--accent-soft); font-weight: 600; }
.domain-pill {
  display: inline-block; margin-bottom: 8px; padding: 3px 10px;
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.04em;
  text-transform: uppercase; border-radius: 4px;
}
.domain-pill.internal { background: rgba(180,140,60,0.15); color: #c9a84c; }
.domain-pill.infra { background: rgba(120,160,200,0.12); color: #8ab4d4; }
.domain-pill.group { background: rgba(160,140,200,0.12); color: #b8a8e8; }
.breadcrumb .domain-crumb { color: var(--text-muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; }
.tree-node.on-path:not(.active) { border-color: rgba(74,143,212,0.12); background: rgba(74,143,212,0.04); }
.level-flow-arrow {
  text-align: center; padding: 4px 0; font-size: 0.65rem; color: var(--text-muted);
  letter-spacing: 0.12em;
}
.col-tree .panel-head { letter-spacing: 0.06em; }
.level-bridge {
  margin: 0 14px 10px; padding: 8px 10px;
  font-size: 0.72rem; line-height: 1.4; color: var(--text-secondary);
  background: rgba(61,154,110,0.08); border-left: 3px solid var(--positive);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.level-bridge b { color: var(--positive); font-weight: 600; }
.level-rollup-note {
  margin: var(--space-sm) var(--space-sm) var(--space-md);
  padding: 10px 14px; font-size: 0.76rem; line-height: 1.45;
  color: var(--text-muted); background: rgba(255,255,255,0.03);
  border: 1px dashed var(--border); border-radius: var(--radius-md);
}
.hierarchy-guide-tree { margin-top: 8px; }
.hierarchy-guide-node {
  margin-bottom: 10px; padding: 12px 14px;
  border: 1px solid var(--border); border-radius: var(--radius-md);
  background: var(--bg-card); box-shadow: var(--shadow-inset);
}
.hg-name { font-weight: 600; font-size: 0.88rem; color: var(--text); margin-bottom: 4px; }
.hg-type {
  font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--accent-soft); margin-left: 6px;
}
.hg-chain { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 6px; }
.hg-text { font-size: 0.78rem; line-height: 1.45; color: var(--text-secondary); }
.hg-legend {
  margin-top: 14px; padding: 10px 12px; font-size: 0.76rem; line-height: 1.45;
  color: var(--text-muted); background: rgba(255,255,255,0.03);
  border-radius: var(--radius-md); border: 1px solid var(--border);
}
.m-influence {
  display: block; margin-top: 6px; font-size: 0.68rem; line-height: 1.35;
  color: var(--text-muted);
}
.m-influence .up { color: #7eb8e8; }
.m-influence .down { color: #c9a84c; }
.m-influence .infl-label { font-weight: 600; margin-right: 4px; }
.m-influence .infl-group { display: block; margin-top: 5px; }
.m-influence .infl-group:first-child { margin-top: 0; }
.influence-link {
  display: inline; padding: 1px 5px; margin: 1px 2px 1px 0;
  border: none; border-radius: 3px; font-size: inherit; font-family: inherit;
  background: rgba(74,143,212,0.18); color: #9ec8ef; cursor: pointer;
  text-decoration: underline; text-underline-offset: 2px;
}
.influence-link:hover { background: rgba(74,143,212,0.32); color: #c5dff5; }
.influence-link.is-muted { opacity: 0.55; cursor: default; text-decoration: none; background: transparent; }
.guide-metric-row .gm-sub { display: block; color: var(--accent); font-size: 0.74rem; margin-top: 2px; }
.guide-metric-row .gm-desc { display: block; color: var(--text-secondary); margin-top: 6px; line-height: 1.45; }
.guide-metric-row .gm-q, .guide-metric-row .gm-formula { display: block; color: var(--text-muted); font-size: 0.74rem; margin-top: 4px; }
.guide-metric-row .gm-src { display: block; font-size: 0.68rem; color: var(--text-muted); margin-top: 6px; font-style: italic; }
.guide-metric-row .gm-proto { display: block; margin-top: 6px; font-size: 0.72rem; }
.guide-metric-row.in-proto { border-left: 2px solid var(--positive); padding-left: 8px; }
.guide-overlay {
  position: fixed; inset: 0; z-index: 250;
  background: rgba(0,0,0,0.55); opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.guide-overlay.open { opacity: 1; pointer-events: auto; }
.guide-panel {
  position: fixed; z-index: 260; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.96);
  width: min(720px, 92vw); max-height: 85vh;
  background: var(--bg-elevated); border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg); box-shadow: 0 12px 48px rgba(0,0,0,0.5);
  display: flex; flex-direction: column; opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
}
.guide-panel.open { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
.guide-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-md) var(--space-lg); border-bottom: 1px solid var(--border);
}
.guide-head h3 { font-size: 1.05rem; font-weight: 600; }
.guide-tabs { display: flex; gap: 4px; padding: var(--space-sm) var(--space-md); border-bottom: 1px solid var(--border); }
.guide-tabs button {
  padding: 6px 12px; font-size: 0.75rem; font-family: inherit;
  border: 1px solid transparent; border-radius: var(--radius-sm);
  background: transparent; color: var(--text-secondary); cursor: pointer;
}
.guide-tabs button.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(74,143,212,0.35); }
.guide-body { padding: var(--space-md) var(--space-lg); overflow-y: auto; flex: 1; font-size: 0.82rem; line-height: 1.5; }
.guide-body h4 { font-size: 0.88rem; margin: 14px 0 8px; color: var(--text); }
.guide-body h4:first-child { margin-top: 0; }
.guide-body p { color: var(--text-secondary); margin-bottom: 10px; }
.guide-level-card {
  margin-bottom: 10px; padding: 14px; border-radius: var(--radius-md);
  border: 1px solid var(--border); background: var(--bg-card);
  box-shadow: var(--shadow-inset);
}
.guide-level-card .gl-title { font-weight: 600; color: var(--accent); margin-bottom: 4px; }
.guide-metric-row {
  padding: 10px 12px; margin-bottom: 8px;
  border: 1px solid var(--border); border-radius: var(--radius-md);
  background: var(--bg-card); font-size: 0.78rem;
}
.guide-metric-row:last-child { margin-bottom: 0; }
.guide-metric-row strong { color: var(--text); font-size: 0.82rem; }
.guide-metric-row .gm-why { color: var(--text-muted); font-size: 0.72rem; display: block; margin-top: 2px; }
.guide-close {
  width: 32px; height: 32px; border: none; border-radius: var(--radius-sm);
  background: transparent; color: var(--text-secondary); font-size: 1.4rem; cursor: pointer;
}
.guide-close:hover { background: var(--bg-hover); color: var(--text); }
.metric-card.has-link { border-left: 2px solid rgba(74,143,212,0.45); }
.metric-card .m-level {
  display: inline-block; margin-bottom: 4px; font-size: 0.62rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent);
}
.passport-level {
  display: inline-block; margin-bottom: 10px; padding: 4px 10px;

function flattenTree(node, path) {
  path = path || [];
  const items = [{ node, path: path.concat(node) }];
  if (node.children) {
    node.children.forEach(function (ch) {
      items.push.apply(items, flattenTree(ch, path.concat(node)));
    });
  }
  return items;
}

function findPath(tree, id, acc) {
  acc = acc || [];
  if (tree.id === id) return acc.concat(tree);
  if (!tree.children) return null;
  for (var i = 0; i < tree.children.length; i++) {
    var found = findPath(tree.children[i], id, acc.concat(tree));
    if (found) return found;
  }
  return null;
}

function getProductData(id) {
  return METRICS_BY_PRODUCT[id] || METRICS_BY_PRODUCT["blok-t"];
}

function getDomain(productId) {
  var path = findPath(PRODUCT_TREE, productId);
  if (!path) return "internal";
  for (var i = path.length - 1; i >= 0; i--) {
    if (path[i].domain) return path[i].domain;
  }
  return "internal";
}

function collectLeaves(node, out) {
  if (node.leaf) {
    out.push(node.id);
    return;
  }
  if (node.children) {
    node.children.forEach(function (ch) {
      collectLeaves(ch, out);
    });
  }
}

function getLeafIdsForProduct(id) {
  var path = findPath(PRODUCT_TREE, id);
  if (!path || !path.length) return [];
  var node = path[path.length - 1];
  if (node.leaf) return [node.id];
  var leaves = [];
  collectLeaves(node, leaves);
  return leaves;
}

function getTreeNode(productId) {
  var path = findPath(PRODUCT_TREE, productId);
  return path && path.length ? path[path.length - 1] : null;
}

function collectLeafNodes(node) {
  var out = [];
  function walk(n) {
    if (n.leaf) out.push(n);
    else if (n.children) n.children.forEach(walk);
  }
  walk(node);
  return out;
}

function pluralProducts(n) {
  var m10 = n % 10;
  var m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return "\u043f\u0440\u043e\u0434\u0443\u043a\u0442";
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return "\u043f\u0440\u043e\u0434\u0443\u043a\u0442\u0430";
  return "\u043f\u0440\u043e\u0434\u0443\u043a\u0442\u043e\u0432";
}

function pluralSegments(n) {
  var m10 = n % 10;
  var m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return "\u0441\u0435\u0433\u043c\u0435\u043d\u0442";
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return "\u0441\u0435\u0433\u043c\u0435\u043d\u0442\u0430";
  return "\u0441\u0435\u0433\u043c\u0435\u043d\u0442\u043e\u0432";
}

function getProductProfile(productId) {
  var full = PRODUCT_PROFILES[productId];
  if (full) return full;
  var node = getTreeNode(productId);
  var info = PRODUCT_NODE_INFO[productId];
  if (!info) return null;
  var prof = {
    headcountTotal: info.headcountTotal,
    headcountFilled: info.headcountFilled,
    owner: info.owner,
    vision: null
  };
  if (node && node.leaf) {
    prof.lifecycle = info.lifecycle || "\u0430\u043a\u0442\u0438\u0432\u043d\u044b\u0439";
  }
  return prof;
}

function formatHeadcountLine(prof) {
  if (!prof || prof.headcountTotal == null) return "";
  var vacant = prof.headcountTotal - prof.headcountFilled;
  return "\u0428\u0442\u0430\u0442: <strong>" + prof.headcountFilled + " / " + prof.headcountTotal +
    "</strong> (\u0437\u0430\u043d\u044f\u0442\u043e \u2014 " + prof.headcountFilled + ", \u0432\u0430\u043a\u0430\u043d\u0441\u0438\u0439 \u2014 " + vacant + ")";
}

function buildPyramidIntroHtml(productId) {
  var node = getTreeNode(productId);
  if (!node) return "";
  var info = PRODUCT_NODE_INFO[productId] || {};
  var prof = getProductProfile(productId);
  var lines = [];
  var leaves = collectLeafNodes(node);

  if (node.id === "blok-t") {
    var clusters = node.children || [];
    lines.push("\u0412 \u0441\u043e\u0441\u0442\u0430\u0432\u0435: <strong>" + clusters.length + " \u043a\u043b\u0430\u0441\u0442\u0435\u0440\u0430</strong>, <strong>" +
      leaves.length + " " + pluralProducts(leaves.length) + "</strong>. \u041f\u0438\u0440\u0430\u043c\u0438\u0434\u0430 L4\u2013L2 (\u0431\u0435\u0437 L1).");
    clusters.forEach(function (cl) {
      var clLeaves = collectLeafNodes(cl);
      lines.push("\u00b7 " + escapeHtml(cl.name) + ": " + clLeaves.length + " " + pluralProducts(clLeaves.length) +
        " (" + clLeaves.map(function (l) { return escapeHtml(l.name); }).join(", ") + ")");
    });
  } else if (node.level === "\u043a\u043b\u0430\u0441\u0442\u0435\u0440") {
    var segs = (node.children || []).filter(function (c) { return c.level === "\u0441\u0435\u0433\u043c\u0435\u043d\u0442"; });
    lines.push("<strong>" + segs.length + " " + pluralSegments(segs.length) + "</strong>, <strong>" + leaves.length + " " +
      pluralProducts(leaves.length) + "</strong>" +
      (leaves.length ? ": " + leaves.map(function (l) { return escapeHtml(l.name); }).join(", ") : "") +
      ". \u041f\u0438\u0440\u0430\u043c\u0438\u0434\u0430 L4\u2013L2 (\u0431\u0435\u0437 L1).");
  } else if (node.level === "\u0441\u0435\u0433\u043c\u0435\u043d\u0442") {
    if (leaves.length === 1) {
      lines.push("\u041f\u0440\u043e\u0434\u0443\u043a\u0442 \u0432 \u0441\u0435\u0433\u043c\u0435\u043d\u0442\u0435: <strong>" + escapeHtml(leaves[0].name) + "</strong>.");
    } else {
      lines.push("<strong>" + leaves.length + " " + pluralProducts(leaves.length) + "</strong>: " +
        leaves.map(function (l) { return escapeHtml(l.name); }).join(", ") + ".");
    }
    lines.push("\u041f\u0438\u0440\u0430\u043c\u0438\u0434\u0430 L4\u2013L2 (\u0431\u0435\u0437 L1). L1 \u0438 operational-\u0434\u0435\u0442\u0430\u043b\u0438 \u2014 \u043d\u0430 \u043b\u0438\u0441\u0442\u043e\u0432\u043e\u043c \u043f\u0440\u043e\u0434\u0443\u043a\u0442\u0435.");
  }

  if (prof) {
    if (node.leaf && prof.lifecycle) {
      lines.push("\u042d\u0442\u0430\u043f \u0416\u0426: <strong>" + escapeHtml(prof.lifecycle) + "</strong>");
    }
    var hc = formatHeadcountLine(prof);
    if (hc) lines.push(hc);
  }

  if (info.owner) {
    lines.push('<span class="intro-owner">\u041e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0439: ' + escapeHtml(info.owner) + "</span>");
  }
  return lines.join("<br>");
}

function buildPyramidIntroBlock(productId) {
  var path = findPath(PRODUCT_TREE, productId) || [];
  var prodName = path.length ? path[path.length - 1].name : "\u2014";
  var domain = getDomain(productId);
  var dmeta = getDomainMeta(productId);
  return '<div class="pyramid-intro"><div class="pyramid-intro-main">' +
    '<span class="domain-pill ' + domain + '">' + escapeHtml(dmeta.short) + "</span>" +
    "<h2>" + escapeHtml(prodName) + "</h2>" +
    '<p class="pyramid-intro-text">' + buildPyramidIntroHtml(productId) + "</p></div></div>";
}

function getMetricAbbrevExpansion(met) {
  if (!met || !met.name) return "";
  var dash = met.name.match(/^([A-Za-z\u0410-\u042f\u0401\u0451][A-Za-z\u0410-\u042f\u0401\u04510-9.\s]+?)\s*[\u2014\u2013-]\s*(.+)$/);
  if (dash) return dash[1].trim() + " \u2014 " + dash[2].trim();
  var lead = met.name.match(/^([A-Z]{2,})\b/);
  if (lead && METRIC_ABBREV_EXTRA[lead[1]]) {
    return lead[1] + " \u2014 " + METRIC_ABBREV_EXTRA[lead[1]];
  }
  return "";
}

var METRIC_NAME_BY_ID = null;
function buildMetricNameIndex() {
  if (METRIC_NAME_BY_ID) return METRIC_NAME_BY_ID;
  METRIC_NAME_BY_ID = {};
  Object.keys(METRICS_BY_PRODUCT).forEach(function (pid) {
    var pd = METRICS_BY_PRODUCT[pid];
    [4, 3, 2, 1].forEach(function (lv) {
      (pd.metrics[lv] || []).forEach(function (met) {
        METRIC_NAME_BY_ID[met.id] = met.name;
      });
    });
  });
  return METRIC_NAME_BY_ID;
}

function findMetricLocation(metricId) {
  var flat = flattenTree(PRODUCT_TREE);
  var i, j, lv, pid, pd, list;
  for (i = 0; i < flat.length; i++) {
    pid = flat[i].node.id;
    pd = getProductData(pid);
    for (lv = 4; lv >= 1; lv--) {
      list = pd.metrics[lv] || [];
      for (j = 0; j < list.length; j++) {
        if (list[j].id === metricId) {
          return { productId: pid, level: lv, metric: list[j] };
        }
      }
    }
  }
  return null;
}

function navigateToMetric(metricId) {
  var loc = findMetricLocation(metricId);
  if (!metricId || !loc) return false;
  closeGuide();
  state.centerView = "metrics";
  selectProduct(loc.productId, metricId);
  return true;
}

function renderMetricLinksHtml(ids) {
  if (!ids || !ids.length) return "";
  var idx = buildMetricNameIndex();
  return ids.map(function (id) {
    var label = idx[id] || id;
    var loc = findMetricLocation(id);
    if (loc) {
      return '<button type="button" class="influence-link" data-goto-metric="' + escapeHtml(id) + '" title="Открыть метрику">' +
        escapeHtml(label) + "</button>";
    }
    return '<span class="influence-link is-muted" title="Нет в прототипе">' + escapeHtml(label) + "</span>";
  }).join(" ");
}

function getDomainMeta(productId) {
  return DOMAINS[getDomain(productId)] || DOMAINS.group;
}

function getLayerHint(domain, levelId) {
  var hints = LAYER_HINTS[domain] || LAYER_HINTS.internal;
  return hints[levelId] || "";
}

function getHierarchyScope(productId) {
  var node = getTreeNode(productId);
  if (!node) return "block";
  if (node.leaf) return "leaf";
  if (node.id === "blok-t") return "block";
  if (node.level === "\u043a\u043b\u0430\u0441\u0442\u0435\u0440") return "cluster";
  if (node.level === "\u0441\u0435\u0433\u043c\u0435\u043d\u0442") return "segment";
  return "cluster";
}

function getVisibleLevels(productId) {
  if (getHierarchyScope(productId) === "leaf") return [4, 3, 2, 1];
  return [4, 3, 2];
}

function getLevelBridge(productId, levelId) {
  var scope = getHierarchyScope(productId);
  var bridges = LEVEL_BRIDGES_BY_SCOPE[scope] || LEVEL_BRIDGES_BY_SCOPE.leaf;
  return bridges[levelId] || null;
}

function getMetricUnitsText(met) {
  if (!met) return "";
  return (met.units || "") + " " + ((met.passport && met.passport.units) || "");
}

function getMetricScaleKind(met) {
  if (!met) return "generic";
  var u = getMetricUnitsText(met);
  if (met.cluster === "CSI" || u.indexOf("1\u201310") >= 0 || u.indexOf("1-10") >= 0) return "csi";
  if (met.cluster === "CSAT" || (u.indexOf("1\u20135") >= 0 && u.indexOf("10") < 0) || (u.indexOf("1-5") >= 0 && u.indexOf("10") < 0)) return "csat";
  if (met.cluster === "Health" && u.indexOf("\u0431\u0430\u043b\u043b") >= 0) return "csat";
  if (u.indexOf("%") >= 0) return "percent";
  if (u.indexOf("\u043c\u043b\u043d") >= 0) return "money";
  if (u.indexOf("\u20bd/\u044e\u043d\u0438\u0442") >= 0 || (u.indexOf("\u20bd") >= 0 && u.indexOf("\u043c\u043b\u043d") < 0)) return "unitCost";
  if (u.indexOf("\u0434\u043d") >= 0 || u.indexOf("\u0447") >= 0 || u.indexOf("\u043c\u0438\u043d") >= 0) return "duration";
  return "generic";
}

function getMetricPolarity(met) {
  if (!met) return "higher";
  var id = met.id || "";
  var name = met.name || "";
  if (/-net$/.test(id) || /-roi$/.test(id) || id === "ai-val" || id === "id-loss" || id === "ic-loss" || id === "idev-ben") return "higher";
  if (LOWER_BETTER_METRIC_IDS[id]) return "lower";
  if (/-(tco|cod|col|cpw|tcost|iod|ttm|ttv|mtr|cfr|lat|manual|fix|skip)$/.test(id)) return "lower";
  if (id === "ai-aue" || id === "ai-col" || id === "id2-t" || id === "ai-disc" || id === "ai-lt" || id === "ic-rlt") return "lower";
  if (/^TCO\b|Cost of downtime|CoL \u2014|\u2014 CoL|CPW|time-to-|lead time|MTTR|\u0434\u0440\u0435\u0439\u0444|fail rate|\u0440\u0430\u0441\u0445\u043e\u0434 \u043d\u0430 \u0442\u043e\u043a\u0435\u043d/i.test(name)) return "lower";
  if (/\u0447\u0438\u0441\u0442\u044b\u0439 \u044d\u0444\u0444\u0435\u043a\u0442|net value|\u044d\u0444\u0444\u0435\u043a\u0442 \u0443\u0441\u043a\u043e\u0440\u0435\u043d\u0438\u044f/i.test(name)) return "higher";
  return "higher";
}

function computeMetricDelta(met, fact, plan) {
  var rawPct = plan ? ((fact - plan) / plan) * 100 : 0;
  var lower = getMetricPolarity(met) === "lower";
  var isGood = lower ? fact <= plan : fact >= plan;
  return {
    rawPct: rawPct,
    deltaCls: isGood ? "up" : "down",
    deltaSign: rawPct >= 0 ? "+" : "",
    lower: lower
  };
}

function formatMetricValue(val, units, met) {
  if (val == null || isNaN(val)) return "\u2014";
  var n = Math.abs(val);
  var u = units || "";
  var kind = met ? getMetricScaleKind(met) : "generic";
  var formatted;
  if (kind === "csi" || kind === "csat") formatted = val.toFixed(1);
  else if (u.indexOf("%") >= 0 || u.indexOf("\u0431\u0430\u043b\u043b") >= 0) formatted = val.toFixed(1);
  else if (n >= 1000) formatted = val.toFixed(0);
  else if (n >= 10) formatted = val.toFixed(1);
  else formatted = val.toFixed(2);
  return formatted + (u ? " " + u : "");
}

function renderHierarchyGuideTree(node, depth) {
  depth = depth || 0;
  var rollup = PRODUCT_HIERARCHY_ROLLUP[node.id];
  var html = '<div class="hierarchy-guide-node" style="margin-left:' + (depth * 14) + 'px">';
  html += '<div class="hg-name">' + escapeHtml(node.name);
  if (node.level) html += '<span class="hg-type">' + escapeHtml(node.level) + "</span>";
  html += "</div>";
  if (rollup && rollup.chain) {
    html += '<div class="hg-chain">' + escapeHtml(rollup.chain) + "</div>";
    html += '<div class="hg-text">' + escapeHtml(rollup.text) + "</div>";
  } else if (node.leaf) {
    html += '<div class="hg-text">\u041b\u0438\u0441\u0442\u043e\u0432\u043e\u0439 \u043f\u0440\u043e\u0434\u0443\u043a\u0442: \u043f\u043e\u043b\u043d\u0430\u044f \u043f\u0438\u0440\u0430\u043c\u0438\u0434\u0430 L1\u2013L4 \u0438 \u043e\u043f\u0438\u0441\u0430\u043d\u0438\u0435.</div>';
  } else if (node.children && node.children.length) {
    html += '<div class="hg-text">\u0421\u0432\u043e\u0434\u043d\u044b\u0435 \u043c\u0435\u0442\u0440\u0438\u043a\u0438; drill-down \u2014 \u0432 \u0434\u043e\u0447\u0435\u0440\u043d\u0438\u0435 \u0443\u0437\u043b\u044b.</div>';
  }
  html += "</div>";
  if (node.children) {
    node.children.forEach(function (ch) {
      html += renderHierarchyGuideTree(ch, depth + 1);
    });
  }
  return html;
}

function isLeafProduct(id) {
  var path = findPath(PRODUCT_TREE, id);
  if (!path || !path.length) return false;
  var node = path[path.length - 1];
  return !!node.leaf;
}

  } else if (inf.up) {
    parts.push('<span class="infl-group"><span class="up">\u2191 ' + escapeHtml(inf.up) + "</span></span>");
  }
  if (inf.drives && inf.drives.length) {
    parts.push('<span class="infl-group"><span class="infl-label down">\u2193 \u0417\u0430\u0432\u0438\u0441\u0438\u0442 \u043e\u0442:</span> ' +
      renderMetricLinksHtml(inf.drives) + "</span>");
  } else if (inf.down) {
    parts.push('<span class="infl-group"><span class="down">\u2193 ' + escapeHtml(inf.down) + "</span></span>");
  }
  return parts.length ? '<span class="m-influence">' + parts.join("") + "</span>" : "";
}

function hashSeed(str) {
  var h = 0;
  for (var i = 0; i < str.length; i++) h = ((h << 5) - h) + str.charCodeAt(i) | 0;
  return Math.abs(h);
}

function clampMetricValue(val, met) {
  if (!met || val == null || isNaN(val)) return val;
  var kind = getMetricScaleKind(met);
  if (kind === "csi") return Math.min(10, Math.max(1, val));
  if (kind === "csat") return Math.min(5, Math.max(1, val));
  if (kind === "percent") return Math.min(100, Math.max(0, val));
  return val;
}

function genChartData(productId, metricId) {
  var loc = metricId ? findMetricLocation(metricId) : null;
  var met = loc ? loc.metric : null;
  var seed = hashSeed((metricId || productId) + "chart");
  var mult = (met && met.chartSeed) ? met.chartSeed : 1;
  var kind = getMetricScaleKind(met);
  var lower = getMetricPolarity(met) === "lower";
  var points = [];
  for (var p = 0; p < 12; p++) {
    var r = ((seed + p * 17) % 100) / 100;
    var r2 = ((seed + p * 31) % 100) / 100;
    var plan, fact;
    if (kind === "csi") {
      plan = 8.1 + (r - 0.5) * 0.8;
      fact = plan + (r2 - 0.46) * 0.7 * mult;
    } else if (kind === "csat") {
      plan = 4.0 + (r - 0.5) * 0.5;
      fact = plan + (r2 - 0.44) * 0.45 * mult;
    } else if (kind === "percent") {
      plan = lower ? 10 + r * 12 : 72 + r * 18;
      fact = plan * (lower ? (1.02 - r2 * 0.18) : (0.9 + r2 * 0.14)) * (lower ? 1 : mult);
    } else if (kind === "money" || kind === "unitCost") {
      plan = (kind === "unitCost" ? 1800 : 22) + r * (kind === "unitCost" ? 2200 : 48);
      fact = plan * (lower ? (0.94 + r2 * 0.14) : (0.9 + r2 * 0.16)) * mult;
    } else if (kind === "duration") {
      plan = 14 + r * 28;
      fact = plan * (0.9 + r2 * 0.2) * mult;
    } else {
      plan = 35 + r * 50;
      fact = plan * (0.88 + r2 * 0.18) * mult;
    }
    plan = clampMetricValue(plan, met);
    fact = clampMetricValue(fact, met);
    points.push({ label: CHART_MONTHS[p], plan: plan, fact: fact });
  }
  return points;
}

function getMetricTrend(productId, metricId) {
  var loc = findMetricLocation(metricId);
  var met = loc ? loc.metric : null;
  var points = genChartData(productId, metricId);
  var last = points[points.length - 1];
  var delta = computeMetricDelta(met, last.fact, last.plan);
  return {
    fact: last.fact,
    plan: last.plan,
    deltaPct: delta.rawPct,
    deltaCls: delta.deltaCls,
    deltaSign: delta.deltaSign,
    lower: delta.lower
  };
}

function renderMetricValueHtml(productId, met) {
  var t = getMetricTrend(productId, met.id);
  var titleAttr = t.lower ? ' title="\u043c\u0435\u043d\u044c\u0448\u0435 \u043f\u043b\u0430\u043d\u0430 \u2014 \u043b\u0443\u0447\u0448\u0435"' : "";
  return '<div class="m-value-row">' +
    '<span class="m-fact">' + escapeHtml(formatMetricValue(t.fact, met.units, met)) + "</span>" +
    '<span class="m-plan">\u043f\u043b\u0430\u043d ' + escapeHtml(formatMetricValue(t.plan, met.units, met)) + "</span>" +
    '<span class="m-delta ' + t.deltaCls + '"' + titleAttr + ">" + t.deltaSign + t.deltaPct.toFixed(1) + "%</span></div>";
}

function navigateBreadcrumb(productId) {
  if (!productId) return;

    state.selectedMetric = null;
    state.selectedLevel = null;
    state.passportOpen = false;
    renderAll();
    return;
  }
  if (productId !== state.selectedProduct) selectProduct(productId);

function scrollToActiveMetric() {
  if (!state.selectedMetric || state.centerView !== "metrics") return;
  requestAnimationFrame(function () {
    var card = document.querySelector(".metric-card.active");
    if (card) card.scrollIntoView({ block: "nearest", behavior: "smooth" });

function renderTreeNodeHtml(node, pathIds) {
  var hasChildren = node.children && node.children.length;
  var isCollapsed = !!state.treeCollapsed[node.id];
  var cls = "tree-node";
  if (node.id === state.selectedProduct) cls += " active";
  if (pathIds.indexOf(node.id) >= 0 && node.id !== state.selectedProduct) cls += " on-path";
  var html = '<div class="tree-branch" data-tree-branch="' + node.id + '"><div class="tree-row">';
  if (hasChildren) {
    html += '<button type="button" class="tree-toggle' + (isCollapsed ? " collapsed" : "") +
      '" data-tree-toggle="' + node.id + '" aria-label="\u0420\u0430\u0441\u043a\u0440\u044b\u0442\u044c \u0432\u043b\u043e\u0436\u0435\u043d\u043d\u043e\u0441\u0442\u044c">\u25be</button>';
  } else {
    html += '<span class="tree-toggle-spacer" aria-hidden="true"></span>';
  }
  html += '<button type="button" class="' + cls + '" data-id="' + node.id + '">' +
    '<span class="node-title">' + escapeHtml(node.name) + "</span></button></div>";
  if (hasChildren && !isCollapsed) {
    html += '<div class="tree-children">';
    node.children.forEach(function (ch) {
      html += renderTreeNodeHtml(ch, pathIds);
    });
    html += "</div>";
  }
  html += "</div>";
  return html;
}

function renderTree() {
  var root = document.getElementById("treeRoot");
  var pathIds = (findPath(PRODUCT_TREE, state.selectedProduct) || []).map(function (n) { return n.id; });
  root.innerHTML = renderTreeNodeHtml(PRODUCT_TREE, pathIds);
  root.querySelectorAll(".tree-node").forEach(function (btn) {
    btn.addEventListener("click", function () {
      selectProduct(btn.getAttribute("data-id"));
    });
  });
  root.querySelectorAll("[data-tree-toggle]").forEach(function (btn) {
    btn.addEventListener("click", function (e) {
      e.stopPropagation();
      toggleTreeNode(btn.getAttribute("data-tree-toggle"));
    });
  });
}

function renderPyramid() {
  var root = document.getElementById("pyramidRoot");

    root.innerHTML = buildProductDescriptionHtml(state.selectedProduct);
    bindPyramidRootEvents(root);
    return;
  }
  var data = getProductData(state.selectedProduct);
  var domain = getDomain(state.selectedProduct);
  var productId = state.selectedProduct;
  var intro = buildPyramidIntroBlock(productId);
  var visibleLevels = getVisibleLevels(productId);
  var scope = getHierarchyScope(productId);
  var levelsHtml = "";
  var levelIdx = 0;
  LEVELS.forEach(function (lv) {
    if (visibleLevels.indexOf(lv.id) < 0) return;
    var metrics = data.metrics[lv.id] || [];
    var layerHint = getLayerHint(domain, lv.id);
    var cards = metrics.map(function (met) {
      var active = state.selectedMetric && state.selectedMetric.id === met.id ? " active" : "";
      var inf = getInfluence(met.id);

      var linkCls = infHtml ? " has-link" : "";
      return '<div class="metric-card' + active + linkCls + '" role="button" tabindex="0" data-metric-id="' + met.id + '" data-level="' + lv.id + '">' +
        '<span class="m-level">L' + lv.id + "</span>" +

        renderMetricValueHtml(productId, met) +
        '<span class="m-row">' +
        '<span class="m-tag">' + escapeHtml(met.cluster) + "</span>" +
        '<span class="m-tag">' + escapeHtml(met.owner) + "</span></span>" +
        infHtml + "</div>";
    }).join("");
    var bridgeText = getLevelBridge(productId, lv.id);
    var bridge = bridgeText ? '<div class="level-bridge"><b>L' + lv.id + " \u2192</b> " + escapeHtml(bridgeText) + "</div>" : "";
    levelsHtml += '<div class="level-block" data-level="' + lv.id + '">' +
      '<div class="level-header"><span class="level-label">' + escapeHtml(lv.label) + '</span><span class="level-tagline">' + escapeHtml(lv.tagline) + "</span></div>" +
      '<div class="level-hint">' + escapeHtml(layerHint) + "</div>" +
      '<div class="level-metrics">' + (cards || '<span style="color:var(--text-muted);font-size:0.8rem">\u041d\u0435\u0442 \u043c\u0435\u0442\u0440\u0438\u043a</span>') + "</div>" +
      bridge + "</div>";
    if (levelIdx < visibleLevels.length - 1) {
      levelsHtml += '<div class="level-flow-arrow" title="\u0412\u043b\u0438\u044f\u043d\u0438\u0435 \u0441\u043d\u0438\u0437\u0443 \u0432\u0432\u0435\u0440\u0445">\u25bc</div>';
    }
    levelIdx++;
  });
  if (scope !== "leaf") {
    levelsHtml += '<div class="level-rollup-note">L1 (\u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c \u043a\u043e\u043c\u0430\u043d\u0434 \u0438 runtime) \u043f\u043e\u043a\u0430\u0437\u044b\u0432\u0430\u0435\u0442\u0441\u044f \u0442\u043e\u043b\u044c\u043a\u043e \u043d\u0430 \u043b\u0438\u0441\u0442\u043e\u0432\u043e\u043c \u043f\u0440\u043e\u0434\u0443\u043a\u0442\u0435. \u0417\u0434\u0435\u0441\u044c \u2014 \u0441\u0432\u043e\u0434 L4\u2013L2.</div>';
  }
  var hintHtml = "";
  if (!state.selectedMetric) {
    hintHtml = '<div class="pyramid-hint"><strong>\u0421\u043b\u0435\u0434\u0443\u044e\u0449\u0438\u0439 \u0448\u0430\u0433:</strong> \u0432\u044b\u0431\u0435\u0440\u0438\u0442\u0435 \u043c\u0435\u0442\u0440\u0438\u043a\u0443 \u2014 \u043e\u0442\u043a\u0440\u043e\u0435\u0442\u0441\u044f \u043f\u0430\u0441\u043f\u043e\u0440\u0442 \u0438 \u0434\u0435\u0442\u0430\u043b\u044c\u043d\u044b\u0439 \u0433\u0440\u0430\u0444\u0438\u043a \u0441\u043f\u0440\u0430\u0432\u0430. \u0421\u0432\u044f\u0437\u0438 \u00ab\u2191 / \u2193\u00bb \u0432\u0435\u0434\u0443\u0442 \u043a \u0441\u0432\u044f\u0437\u0430\u043d\u043d\u044b\u043c \u043f\u043e\u043a\u0430\u0437\u0430\u0442\u0435\u043b\u044f\u043c.</div>';
  }
  root.innerHTML = intro + hintHtml + levelsHtml;
  bindPyramidRootEvents(root);
  scrollToActiveMetric();
}

function bindPyramidRootEvents(root) {
  root.querySelectorAll(".metric-card").forEach(function (card) {
    card.addEventListener("click", function (e) {
      if (e.target.closest("[data-goto-metric]")) return;
      var mid = card.getAttribute("data-metric-id");
      var lv = parseInt(card.getAttribute("data-level"), 10);
      var data = getProductData(state.selectedProduct);
      var found = null;
      (data.metrics[lv] || []).forEach(function (met) {
        if (met.id === mid) found = met;
      });
      if (found) {
        closeGuide();
        state.centerView = "metrics";
        state.selectedMetric = found;
        state.selectedLevel = lv;
        state.passportOpen = true;
        renderAll();
      }
    });
    card.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        card.click();
      }
    });
  });
}

function renderCharts() {
  var root = document.getElementById("chartsRoot");
  var path = findPath(PRODUCT_TREE, state.selectedProduct) || [];
  var prodName = path.length ? path[path.length - 1].name : "—";
  if (!state.selectedProduct) {
    root.innerHTML = '<div class="chart-empty"><span class="chart-empty-icon" aria-hidden="true">\u25e6</span>\u0412\u044b\u0431\u0435\u0440\u0438\u0442\u0435 \u043f\u0440\u043e\u0434\u0443\u043a\u0442 \u0432 \u0438\u0435\u0440\u0430\u0440\u0445\u0438\u0438 \u0441\u043b\u0435\u0432\u0430</div>';
    return;
  }
  var domain = getDomain(state.selectedProduct);
  var dmeta = getDomainMeta(state.selectedProduct);
  var metric = state.selectedMetric;
  var title = metric ? metric.name : "Сводный контекст: " + prodName;
  var sub = metric
    ? dmeta.chartSub + " · " + metric.units
    : dmeta.chartSubAgg;
  var points = genChartData(state.selectedProduct, metric ? metric.id : null);
  var maxVal = Math.max(1, Math.max.apply(null, points.map(function (pt) { return Math.max(pt.plan, pt.fact); })));
  var planTitle = dmeta.kpiPlan;
  var factTitle = dmeta.kpiFact;
  var bars = points.map(function (pt) {
    var ph = Math.round((pt.plan / maxVal) * 100);
    var fh = Math.round((pt.fact / maxVal) * 100);
    var planPctMax = (pt.plan / maxVal * 100).toFixed(0);
    var factPctMax = (pt.fact / maxVal * 100).toFixed(0);
    var factVsPlan = pt.plan > 0 ? (pt.fact / pt.plan * 100).toFixed(0) : "\u2014";
    var planFmt = metric ? formatMetricValue(pt.plan, metric.units, metric) : pt.plan.toFixed(1);
    var factFmt = metric ? formatMetricValue(pt.fact, metric.units, metric) : pt.fact.toFixed(1);
    var tip = pt.label + ": \u043f\u043b\u0430\u043d " + planFmt + " (" + planPctMax + "% \u043e\u0442 \u043c\u0430\u043a\u0441.), \u0444\u0430\u043a\u0442 " +
      factFmt + " (" + factPctMax + "% \u043e\u0442 \u043c\u0430\u043a\u0441., " + factVsPlan + "% \u043a \u043f\u043b\u0430\u043d\u0443)";
    return '<div class="bar-group" title="' + escapeHtml(tip) + '"><div class="bar-wrap">' +
      '<div class="bar plan" style="height:' + ph + '%"></div>' +
      '<div class="bar fact" style="height:' + fh + '%"></div></div>' +
      '<span class="bar-label">' + escapeHtml(pt.label) + "</span></div>";
  }).join("");
  var last = points[points.length - 1];
  var deltaInfo = computeMetricDelta(metric, last.fact, last.plan);
  var delta = deltaInfo.rawPct.toFixed(1);
  var deltaCls = deltaInfo.deltaCls;
  var note = metric
    ? "\u041f\u0440\u043e\u0434\u0443\u043a\u0442 \u00ab" + prodName + "\u00bb \u00b7 \u043c\u0435\u0442\u0440\u0438\u043a\u0430 \u00ab" + metric.name + "\u00bb. " + dmeta.noteMetric
    : dmeta.noteAgg;
  var promptHtml = metric ? "" :
    '<div class="chart-prompt"><strong>\u0412\u044b\u0431\u0435\u0440\u0438\u0442\u0435 \u043c\u0435\u0442\u0440\u0438\u043a\u0443</strong> \u043d\u0430 \u043f\u0438\u0440\u0430\u043c\u0438\u0434\u0435 \u2014 \u0437\u0434\u0435\u0441\u044c \u043f\u043e\u044f\u0432\u0438\u0442\u0441\u044f \u043f\u043b\u0430\u043d/\u0444\u0430\u043a\u0442 \u043f\u043e \u043a\u043e\u043d\u043a\u0440\u0435\u0442\u043d\u043e\u043c\u0443 \u043f\u043e\u043a\u0430\u0437\u0430\u0442\u0435\u043b\u044e \u0438 \u043e\u0442\u043a\u0440\u043e\u0435\u0442\u0441\u044f \u043f\u0430\u0441\u043f\u043e\u0440\u0442.' +
    '<div class="chart-scope">\u0421\u0435\u0439\u0447\u0430\u0441: \u0441\u0432\u043e\u0434\u043d\u044b\u0439 \u043e\u0440\u0438\u0435\u043d\u0442\u0438\u0440 \u043f\u043e \u00ab' + escapeHtml(prodName) + "\u00bb</div></div>";
  root.innerHTML =
    promptHtml +
    '<div class="chart-title">' + escapeHtml(title) + "</div>" +
    '<div class="chart-sub">' + escapeHtml(sub) + "</div>" +
    '<div class="kpi-row">' +
    '<div class="kpi-box"><div class="k-label">' + escapeHtml(planTitle) + " (\u043f\u043e\u0441\u043b.)</div><div class=\"k-val\">" + escapeHtml(formatMetricValue(last.plan, metric ? metric.units : "", metric)) + "</div></div>" +
    '<div class="kpi-box"><div class="k-label">' + escapeHtml(factTitle) + " (\u043f\u043e\u0441\u043b.)</div><div class=\"k-val\">" + escapeHtml(formatMetricValue(last.fact, metric ? metric.units : "", metric)) +
    '</div><div class="k-delta ' + deltaCls + '"' + (deltaInfo.lower ? ' title="\u043c\u0435\u043d\u044c\u0448\u0435 \u043f\u043b\u0430\u043d\u0430 \u2014 \u043b\u0443\u0447\u0448\u0435"' : "") + ">" + deltaInfo.deltaSign + delta + "% " + escapeHtml(dmeta.deltaLabel) + "</div></div></div>" +
    '<div class="chart-legend"><span><span class="dot dot-plan"></span> ' + escapeHtml(planTitle) + '</span><span><span class="dot dot-fact"></span> ' + escapeHtml(factTitle) + "</span></div>" +
    '<div class="chart-bars">' + bars + "</div>" +
    '<div class="chart-note">' + escapeHtml(note) + "</div>";
}

function renderAll() {
  renderBreadcrumbs();
  renderTree();
  renderPyramid();
  renderPassport();
  renderCharts();
  if (state.guideOpen) renderGuide();
}

function escapeHtml(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

document.getElementById("passportClose").addEventListener("click", function () {
  state.passportOpen = false;
  renderPassport();
});
document.getElementById("passportOverlay").addEventListener("click", function () {
  state.passportOpen = false;
  renderPassport();
});
document.getElementById("btnToggleProductView").addEventListener("click", function () {
  if (!isLeafProduct(state.selectedProduct)) return;
  state.centerView = state.centerView === "description" ? "metrics" : "description";
  state.passportOpen = false;
  renderAll();
});
document.addEventListener("keydown", function (e) {
  if (e.key !== "Escape") return;
  if (state.passportOpen) {
    state.passportOpen = false;
    renderPassport();
  } else if (state.centerView === "description") {
    state.centerView = "metrics";
    renderPyramid();
  } else if (state.guideOpen) {
    closeGuide();
  }
});

document.getElementById("btnGuideLevels").addEventListener("click", function () {
  openGuide("levels");
});
document.getElementById("btnGuideCatalog").addEventListener("click", function () {
  openGuide("catalog");
});
document.getElementById("guideClose").addEventListener("click", closeGuide);
document.getElementById("guideOverlay").addEventListener("click", closeGuide);
document.getElementById("guidePanel").addEventListener("click", function (e) {
  e.stopPropagation();
});
document.getElementById("guideTabs").addEventListener("click", function (e) {
  var btn = e.target.closest("[data-guide-tab]");
  if (!btn) return;
  state.guideTab = btn.getAttribute("data-guide-tab");
  renderGuide();
});

document.addEventListener("click", function (e) {
  var link = e.target.closest("[data-goto-metric]");
  if (!link) return;
  e.preventDefault();
  e.stopPropagation();
  var mid = link.getAttribute("data-goto-metric");
  if (mid) navigateToMetric(mid);
});

selectProduct("blok-t");
</script>
</body>
</html>
