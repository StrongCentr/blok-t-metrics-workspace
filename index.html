<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рабочее место лидера — Блок Т</title>
<style>
:root {
  --bg: #0b0d11;
  --bg-elevated: #12151c;
  --bg-card: #171b26;
  --bg-hover: #1d2330;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.13);
  --text: #eceef3;
  --text-secondary: #939aad;
  --text-muted: #5e657a;
  --accent: #5a9de0;
  --accent-soft: #9ec8ef;
  --accent-dim: rgba(90,157,224,0.14);
  --positive: #45a87a;
  --positive-dim: rgba(69,168,122,0.14);
  --l4-bg: #1a2235;
  --l3-bg: #171d2a;
  --l2-bg: #141820;
  --l1-bg: #111418;
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.32);
  --shadow-inset: inset 0 1px 0 rgba(255,255,255,0.04);
  --font: "Segoe UI", system-ui, -apple-system, sans-serif;
  --header-h: 64px;
  --passport-w: 420px;
  --mtree-l4: #54c889;
  --mtree-l3: #f1a447;
  --mtree-l2: #d96aa4;
  --mtree-l1: #6f90e8;
  --mtree-edge-direct: rgba(120,200,160,0.65);
  --mtree-edge-indirect: rgba(150,170,210,0.55);
  --mtree-card-bg: linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.012)), #0d1420;
  --mtree-shadow: 0 24px 80px rgba(0,0,0,0.38);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: var(--font);
  margin: 0;
  background:
    radial-gradient(circle at 10% -10%, rgba(141,187,255,0.20), transparent 30%),
    radial-gradient(circle at 78% 2%, rgba(214,183,120,0.14), transparent 26%),
    radial-gradient(circle at 50% 112%, rgba(110,231,200,0.08), transparent 32%),
    linear-gradient(160deg, #06080d, #0d1320 52%, #070a10);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.45;
  overflow-x: hidden;
}
.metric-backdrop {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  background:
    radial-gradient(ellipse 60% 55% at 24% 38%, rgba(110,231,200,0.10), transparent 70%),
    linear-gradient(90deg, rgba(110,231,200,0.10) 1px, transparent 1px),
    linear-gradient(0deg, rgba(141,187,255,0.075) 1px, transparent 1px);
  background-size: auto, 180px 180px, 180px 180px;
  opacity: 0.72;
  animation: gridDrift 18s linear infinite;
}
.metric-backdrop .backdrop-scene {
  position: absolute; inset: 0;
  -webkit-mask-image: radial-gradient(ellipse 48% 52% at 28% 52%, transparent 0 40%, rgba(0,0,0,0.35) 58%, rgba(0,0,0,0.75) 78%, #000 100%);
  mask-image: radial-gradient(ellipse 48% 52% at 28% 52%, transparent 0 40%, rgba(0,0,0,0.35) 58%, rgba(0,0,0,0.75) 78%, #000 100%);
}
.metric-backdrop .centerline {
  position: absolute; top: 6%; bottom: 6%; left: 72%; width: 1px;
  background: linear-gradient(180deg, transparent, rgba(110,231,200,0.55) 20%, rgba(141,187,255,0.42) 80%, transparent);
}
.metric-backdrop .bgtrack {
  position: absolute; left: 0; right: 0; height: 1px;
  background: rgba(223,232,255,0.08);
}
.metric-backdrop .bgpin {
  position: absolute; top: 50%; left: 0; width: 9px; height: 9px; border-radius: 50%;
  background: #d6b778;
  box-shadow: 0 0 10px rgba(110,231,200,0.65), 0 0 26px rgba(110,231,200,0.28);
  animation: pinGlide var(--dur) cubic-bezier(0.4,0,0.2,1) infinite;
  animation-delay: var(--del);
  will-change: transform, opacity;
}
@keyframes gridDrift {
  from { background-position: 0 0, 0 0, 0 0; }
  to { background-position: 0 0, 180px 90px, 90px 180px; }
}
@keyframes pinGlide {
  0% { transform: translate3d(var(--x0), -50%, 0); opacity: 0; }
  8% { opacity: var(--op); }
  42%, 68% { transform: translate3d(calc(72vw - 50%), -50%, 0); opacity: var(--op); }
  92% { opacity: var(--op); }
  100% { transform: translate3d(var(--x0), -50%, 0); opacity: 0; }
}
.app { display: flex; flex-direction: column; min-height: 100vh; position: relative; z-index: 1; }
.app-views { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.app-view-home #workspaceRoot { display: none !important; }
.app-view-workspace #homeRoot { display: none !important; }
.header {
  position: sticky; top: 0; z-index: 100;
  display: grid; grid-template-columns: auto auto 1fr auto;
  align-items: center; gap: var(--space-md);
  padding: var(--space-sm) var(--space-lg);
  min-height: var(--header-h);
  background: rgba(7,10,16,0.78);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(18px);
}
.header-brand {
  font-size: 0.82rem; font-weight: 600; letter-spacing: -0.02em;
  color: var(--text); white-space: nowrap; cursor: pointer;
}
.header-brand:hover { color: var(--accent-soft); }
.header-nav {
  display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}
.header-nav button {
  padding: 6px 11px; font-size: 0.72rem; font-family: inherit; font-weight: 500;
  border: 1px solid transparent; border-radius: var(--radius-sm);
  background: transparent; color: var(--text-muted); cursor: pointer;
  white-space: nowrap; transition: color 0.15s, background 0.15s, border-color 0.15s;
}
.header-nav button:hover { color: var(--text); background: var(--bg-hover); }
.header-nav button.active {
  color: var(--accent-soft); background: var(--accent-dim);
  border-color: rgba(90,157,224,0.35);
}
.header-main {
  display: flex; align-items: center; gap: var(--space-sm);
  flex-wrap: wrap; min-width: 0;
}
.header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.header-btn {
  padding: 7px 12px; font-size: 0.72rem; font-family: inherit; font-weight: 500;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-card); color: var(--text-secondary); cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.header-btn:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border-strong); }
.header-btn.primary { background: var(--accent-dim); color: var(--accent-soft); border-color: rgba(90,157,224,0.35); }
.header-btn.primary:hover { background: rgba(90,157,224,0.22); color: #c5dff5; }
.breadcrumb { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; font-size: 0.78rem; min-width: 0; }
.breadcrumb span { color: var(--text-muted); }
.breadcrumb .crumb {
  color: var(--text-secondary); background: none; border: none; padding: 0;
  font: inherit; cursor: default;
}
.breadcrumb .crumb.is-link {
  cursor: pointer; text-decoration: underline; text-underline-offset: 2px;
  text-decoration-color: rgba(255,255,255,0.2);
}
.breadcrumb .crumb.is-link:hover { color: var(--text); text-decoration-color: var(--accent-soft); }
.breadcrumb .crumb.is-current { color: var(--text); font-weight: 500; cursor: default; text-decoration: none; }
.breadcrumb .sep { color: var(--text-muted); user-select: none; opacity: 0.6; }
.metric-crumb {
  padding: 3px 10px; border-radius: 20px;
  background: var(--accent-dim); color: var(--accent); font-size: 0.75rem; font-weight: 500;
  max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.main {
  display: grid;
  grid-template-columns: 260px 1fr 300px;
  gap: var(--space-md);
  padding: var(--space-md) var(--space-lg);
  flex: 1;
  align-items: start;
}
.panel {
  background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 48%), var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow), var(--shadow-inset);
  overflow: hidden;
}
.panel-head {
  padding: var(--space-md);
  border-bottom: 1px solid var(--border);
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-muted);
}
.pyramid-panel-head {
  display: flex; align-items: center; justify-content: flex-start; gap: var(--space-md);
  padding-top: 10px; padding-bottom: 10px;
}
.pyramid-panel-head[hidden] { display: none; }
.pyramid-panel-toggle {
  flex-shrink: 0; padding: 6px 12px; font-size: 0.72rem; font-family: inherit; font-weight: 600;
  text-transform: none; letter-spacing: 0;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: transparent; color: var(--text-secondary); cursor: pointer;
}
.pyramid-panel-toggle:hover { color: var(--text); border-color: var(--border-strong); background: var(--bg-hover); }
.pyramid-panel-toggle.active {
  background: var(--accent-dim); color: var(--accent); border-color: rgba(74,143,212,0.45);
}
.pyramid-panel-toggle.active:hover { background: rgba(74,143,212,0.28); }
.pyramid-panel-actions {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.mtree-wrap { padding: 0 var(--space-sm) var(--space-md); }
.mtree-card {
  background: var(--mtree-card-bg);
  border: 1px solid rgba(223,232,255,0.18);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: var(--mtree-shadow);
}
.mtree-toolbar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
}
.mtree-toolbar-title { font-size: 0.84rem; color: var(--text-secondary); margin-right: auto; }
.mtree-toolbar-title b { color: var(--text); font-weight: 600; }
.mtree-legend-inline {
  display: flex; flex-wrap: wrap; gap: 8px 12px; font-size: 0.64rem; color: var(--text-muted);
}
.mtree-legend-inline span { display: inline-flex; align-items: center; gap: 5px; }
.mtree-legend-inline i {
  display: inline-block; width: 9px; height: 9px; border-radius: 3px;
}
.mtree-guide {
  display: flex; gap: 8px; align-items: flex-start;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  background: linear-gradient(90deg,rgba(141,187,255,0.08),rgba(214,183,120,0.045));
  color: #c8d2e4; font-size: 0.78rem; line-height: 1.45;
}
.mtree-guide b { color: #eef6ff; }
.mtree-guide-icon {
  flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.68rem; font-weight: 700; color: #bcd8ff;
  background: rgba(141,187,255,0.14); border: 1px solid rgba(141,187,255,0.22);
}
.mgraph {
  position: relative; min-height: 400px; padding: 16px 10px 28px;
  background:
    radial-gradient(circle at 1px 1px,rgba(255,255,255,0.045) 1px,transparent 0),
    radial-gradient(circle at 50% 0%,rgba(141,187,255,0.06),transparent 36%);
  background-size: 26px 26px, 100% 100%;
}
.mgraph-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none; overflow: visible; z-index: 0;
}
.mgraph-path { fill: none; transition: opacity 0.15s, stroke-width 0.15s; }
.mgraph-path-depends { stroke: var(--mtree-edge-direct); stroke-width: 2; }
.mgraph-path-influences {
  stroke: var(--mtree-edge-indirect); stroke-width: 1.6; stroke-dasharray: 5 5;
}
.mgraph-row {
  position: relative; z-index: 1;
  display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start;
  gap: 14px 18px; margin-bottom: 44px; padding-top: 8px;
}
.mgraph-row-label {
  flex: 0 0 100%; text-align: center;
  font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 4px;
}
.mgraph-row[data-level="4"] .mgraph-row-label { color: var(--mtree-l4); }
.mgraph-row[data-level="3"] .mgraph-row-label { color: var(--mtree-l3); }
.mgraph-row[data-level="2"] .mgraph-row-label { color: var(--mtree-l2); }
.mgraph-row[data-level="1"] .mgraph-row-label { color: var(--mtree-l1); }
.mgraph-row-external {
  margin-top: 4px; padding-top: 16px; border-top: 1px dashed rgba(223,232,255,0.14);
}
.mgraph-node, .mtree-node {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  min-width: 132px; max-width: 196px; padding: 12px 14px 11px;
  border: 2px dashed var(--node-color, var(--border-strong));
  border-radius: 12px;
  background: color-mix(in srgb, var(--node-color, var(--bg-card)) 13%, transparent);
  cursor: pointer; font-family: inherit; text-align: center;
  transition: border-color 0.15s, box-shadow 0.15s, opacity 0.15s, border-style 0.15s;
}
.mgraph-node:hover, .mtree-node:hover {
  border-style: solid;
  box-shadow: 0 6px 20px rgba(0,0,0,0.28);
}
.mgraph-node.active, .mtree-node.active {
  border-style: solid; border-color: #fff;
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--node-color, var(--accent)) 45%, transparent);
}
.mgraph-node.lvl-4, .mtree-node.lvl-4 { --node-color: var(--mtree-l4); }
.mgraph-node.lvl-3, .mtree-node.lvl-3 { --node-color: var(--mtree-l3); }
.mgraph-node.lvl-2, .mtree-node.lvl-2 { --node-color: var(--mtree-l2); }
.mgraph-node.lvl-1, .mtree-node.lvl-1 { --node-color: var(--mtree-l1); }
.mgraph-node.dimmed, .mtree-node.dimmed { opacity: 0.22; filter: grayscale(0.2); }
.mgraph-node.focus, .mtree-node.focus {
  opacity: 1; border-style: solid; border-color: #fff;
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--node-color) 50%, transparent);
}
.mgraph-node.related, .mtree-node.related { opacity: 1; border-style: solid; }
.mgraph-empty-hint {
  padding: 8px 14px; font-size: 0.76rem; line-height: 1.45;
  color: var(--text-muted); background: rgba(255,255,255,0.025);
  border-bottom: 1px dashed rgba(223,232,255,0.12); text-align: center;
}
.tree-search-wrap {
  padding: 8px 10px 0; border-bottom: 1px solid var(--border);
}
.tree-search-input {
  width: 100%; padding: 8px 10px; font-family: inherit; font-size: 0.78rem;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-card); color: var(--text);
}
.tree-search-input:focus {
  outline: none; border-color: rgba(90,157,224,0.45);
}
.tree-search-results { padding: 4px 0; }
.tree-search-hit {
  display: block; width: 100%; text-align: left; padding: 8px 10px;
  border: none; border-radius: var(--radius-sm); background: transparent;
  font-family: inherit; font-size: 0.78rem; color: var(--text-secondary); cursor: pointer;
}
.tree-search-hit:hover { background: var(--bg-hover); color: var(--text); }
.tree-search-hit .tree-search-path {
  display: block; font-size: 0.66rem; color: var(--text-muted); margin-top: 2px;
}
.home-cluster-strip {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;
}
.home-cluster-chip {
  padding: 10px 12px; border-radius: var(--radius-md);
  border: 1px solid var(--border); background: var(--bg-card);
}
.home-cluster-chip h4 { font-size: 0.78rem; font-weight: 600; margin-bottom: 6px; }
.home-cluster-kpis { display: flex; flex-wrap: wrap; gap: 6px; }
.workspace-center-view { padding: 4px 2px 8px; }
.product-desc-view {
  padding: 4px 8px 12px;
}
.mgraph-node-external {
  --node-color: #8dbbff;
  border-style: dashed; opacity: 0.92; min-width: 108px;
  background: rgba(255,255,255,0.03);
}
.mgraph-ext-hint { font-size: 0.58rem; color: var(--text-muted); }
.mtree-badge {
  font-size: 0.58rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; padding: 2px 8px; border-radius: 999px;
  background: rgba(0,0,0,0.28); color: #fff;
}
.mtree-name { font-size: 0.8rem; font-weight: 700; line-height: 1.3; color: var(--text); }
.mtree-val { font-size: 0.72rem; color: #bcd8ff; font-weight: 600; }
.mgraph-legend-arrows {
  display: flex; flex-wrap: wrap; gap: 10px 14px;
  font-size: 0.64rem; color: var(--text-muted);
}
.mgraph-legend-arrows span { display: inline-flex; align-items: center; gap: 6px; }
.mgraph-legend-line {
  display: inline-block; width: 26px; height: 0;
  border-top: 2px solid var(--mtree-edge-direct);
}
.mgraph-legend-line.infl { border-top: 2px dashed var(--mtree-edge-indirect); }
.editor-level-criteria {
  margin: -4px 0 12px; padding: 10px 12px; font-size: 0.74rem; line-height: 1.45;
  color: var(--text-secondary); background: rgba(69,168,122,0.08);
  border: 1px solid rgba(69,168,122,0.2); border-radius: var(--radius-sm);
}
.editor-level-criteria strong { color: var(--positive); }
.panel-body { padding: var(--space-sm); }
.col-tree .panel-body { max-height: calc(100vh - var(--header-h) - 120px); overflow-y: auto; }
.tree-branch { margin-bottom: 2px; }
.tree-row {
  display: flex; align-items: flex-start; gap: 0; width: 100%;
}
.tree-toggle, .tree-toggle-spacer {
  flex-shrink: 0; width: 24px; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.tree-toggle {
  border: none; background: transparent; color: var(--text-muted);
  cursor: pointer; font-size: 0.65rem; padding: 0; border-radius: 4px;
  transition: transform 0.15s ease, color 0.15s;
}
.tree-toggle:hover { color: var(--text); background: var(--bg-hover); }
.tree-toggle.collapsed { transform: rotate(-90deg); }
.tree-children {
  margin-left: 11px; padding-left: 8px;
  border-left: 1px solid var(--border);
}
.tree-node {
  display: block; flex: 1; min-width: 0; text-align: left;
  padding: 8px 10px; margin-bottom: 0;
  border: 1px solid transparent; border-radius: var(--radius-md);
  background: transparent; color: var(--text); cursor: pointer;
  font-family: inherit; transition: background 0.15s, border-color 0.15s;
}
.tree-node:hover { background: var(--bg-hover); border-color: var(--border); }
.tree-node.active {
  background: var(--accent-dim); border-color: rgba(74,143,212,0.35);
}
.tree-node .node-title { font-size: 0.88rem; font-weight: 500; display: block; line-height: 1.35; }
.col-pyramid .panel-body { max-height: calc(100vh - var(--header-h) - 100px); overflow-y: auto; }
.pyramid-intro {
  padding: var(--space-md); margin-bottom: var(--space-md);
  background: linear-gradient(165deg, rgba(255,255,255,0.03) 0%, transparent 50%), var(--bg-card);
  border-radius: var(--radius-md);
  border: 1px solid var(--border); box-shadow: var(--shadow-inset);
}
.pyramid-intro-main { flex: 1; min-width: 0; }
.pyramid-intro h2 { font-size: 1.15rem; font-weight: 600; margin-bottom: 6px; }
.pyramid-intro-text { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.5; }
.pyramid-intro-text .intro-owner { display: block; margin-top: 6px; color: var(--text-muted); }
.level-block { margin-bottom: var(--space-md); border-radius: var(--radius-md); overflow: hidden; }
.product-desc-view { padding: 0 var(--space-sm) var(--space-md); }
.product-desc-head {
  padding: var(--space-md); margin-bottom: var(--space-md);
  background: linear-gradient(165deg, rgba(255,255,255,0.03) 0%, transparent 50%), var(--bg-card);
  border-radius: var(--radius-md);
  border: 1px solid var(--border); box-shadow: var(--shadow-inset);
}
.product-desc-head h2 { font-size: 1.15rem; font-weight: 600; margin-top: 8px; }
.product-desc-section {
  margin-top: var(--space-md); padding: var(--space-md) var(--space-md) var(--space-lg);
  background: linear-gradient(165deg, rgba(255,255,255,0.025) 0%, transparent 55%), var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius-md);
  box-shadow: var(--shadow-inset);
}
.product-desc-section h3 {
  font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: var(--space-md);
}
.brief-section { margin-bottom: var(--space-md); }
.brief-section:last-child { margin-bottom: 0; }
.brief-section label {
  display: block; font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px;
}
.brief-section .val { font-size: 0.88rem; line-height: 1.5; color: var(--text-secondary); }
.lifecycle-pill {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  background: var(--positive-dim); color: var(--positive); font-size: 0.8rem; font-weight: 600;
}
.artifact-list { list-style: none; }
.artifact-item {
  padding: 12px 0; border-bottom: 1px solid var(--border);
  font-size: 0.82rem; line-height: 1.45;
}

const CHART_MONTHS = ["\u042f\u043d\u0432","\u0424\u0435\u0432","\u041c\u0430\u0440","\u0410\u043f\u0440","\u041c\u0430\u0439","\u0418\u044e\u043d","\u0418\u044e\u043b","\u0410\u0432\u0433","\u0421\u0435\u043d","\u041e\u043a\u0442","\u041d\u043e\u044f","\u0414\u0435\u043a"];

var FLAT_TREE = null;
function getFlatTree() {
  if (!FLAT_TREE) FLAT_TREE = flattenTree(PRODUCT_TREE);
  return FLAT_TREE;
}

function flattenTree(node, path) {
  path = path || [];
  const items = [{ node, path: path.concat(node) }];
  if (node.children) {
    node.children.forEach(function (ch) {
      items.push.apply(items, flattenTree(ch, path.concat(node)));
    });
  }
  return items;
}

function findPath(tree, id, acc) {
  acc = acc || [];
  if (tree.id === id) return acc.concat(tree);
  if (!tree.children) return null;
  for (var i = 0; i < tree.children.length; i++) {
    var found = findPath(tree.children[i], id, acc.concat(tree));
    if (found) return found;
  }
  return null;
}

function getProductData(id) {
  return METRICS_BY_PRODUCT[id] || METRICS_BY_PRODUCT["blok-t"];
}

function getDomain(productId) {
  var path = findPath(PRODUCT_TREE, productId);
  if (!path) return "internal";
  for (var i = path.length - 1; i >= 0; i--) {
    if (path[i].domain) return path[i].domain;
  }
  return "internal";
}

function getTreeNode(productId) {
  var path = findPath(PRODUCT_TREE, productId);
  return path && path.length ? path[path.length - 1] : null;
}

function collectLeafNodes(node) {
  var out = [];
  function walk(n) {
    if (n.leaf) out.push(n);
    else if (n.children) n.children.forEach(walk);
  }
  walk(node);
  return out;
}

function pluralProducts(n) {
  var m10 = n % 10;
  var m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return "\u043f\u0440\u043e\u0434\u0443\u043a\u0442";
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return "\u043f\u0440\u043e\u0434\u0443\u043a\u0442\u0430";
  return "\u043f\u0440\u043e\u0434\u0443\u043a\u0442\u043e\u0432";
}

function pluralSegments(n) {
  var m10 = n % 10;
  var m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return "\u0441\u0435\u0433\u043c\u0435\u043d\u0442";
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return "\u0441\u0435\u0433\u043c\u0435\u043d\u0442\u0430";
  return "\u0441\u0435\u0433\u043c\u0435\u043d\u0442\u043e\u0432";
}

function getProductProfile(productId) {
  var full = PRODUCT_PROFILES[productId];
  if (full) return full;
  var node = getTreeNode(productId);
  var info = PRODUCT_NODE_INFO[productId];
  if (!info) return null;
  var prof = {
    headcountTotal: info.headcountTotal,
    headcountFilled: info.headcountFilled,
    owner: info.owner,
    vision: null
  };
  if (node && node.leaf) {
    prof.lifecycle = info.lifecycle || "\u0430\u043a\u0442\u0438\u0432\u043d\u044b\u0439";
  }
  return prof;
}

function formatHeadcountLine(prof) {
  if (!prof || prof.headcountTotal == null) return "";
  var vacant = prof.headcountTotal - prof.headcountFilled;
  return "\u0428\u0442\u0430\u0442: <strong>" + prof.headcountFilled + " / " + prof.headcountTotal +
    "</strong> (\u0437\u0430\u043d\u044f\u0442\u043e \u2014 " + prof.headcountFilled + ", \u0432\u0430\u043a\u0430\u043d\u0441\u0438\u0439 \u2014 " + vacant + ")";
}

function buildPyramidIntroHtml(productId) {
  var node = getTreeNode(productId);
  if (!node) return "";
  var info = PRODUCT_NODE_INFO[productId] || {};
  var prof = getProductProfile(productId);
  var lines = [];
  var leaves = collectLeafNodes(node);

  if (node.id === "blok-t") {
    var clusters = node.children || [];
    lines.push("\u0412 \u0441\u043e\u0441\u0442\u0430\u0432\u0435: <strong>" + clusters.length + " \u043a\u043b\u0430\u0441\u0442\u0435\u0440\u0430</strong>, <strong>" +
      leaves.length + " " + pluralProducts(leaves.length) + "</strong>. \u041f\u0438\u0440\u0430\u043c\u0438\u0434\u0430 L4\u2013L2 (\u0431\u0435\u0437 L1).");
    clusters.forEach(function (cl) {
      var clLeaves = collectLeafNodes(cl);
      lines.push("\u00b7 " + escapeHtml(cl.name) + ": " + clLeaves.length + " " + pluralProducts(clLeaves.length) +
        " (" + clLeaves.map(function (l) { return escapeHtml(l.name); }).join(", ") + ")");
    });
  } else if (node.level === "\u043a\u043b\u0430\u0441\u0442\u0435\u0440") {
    lines.push("<strong>" + leaves.length + " " + pluralProducts(leaves.length) + "</strong>" +
      (leaves.length ? ": " + leaves.map(function (l) { return escapeHtml(l.name); }).join(", ") : "") +
      ". Пирамида L4–L2 (без L1).");
  } else if (node.level === "\u0441\u0435\u0433\u043c\u0435\u043d\u0442") {
    if (leaves.length === 1) {
      lines.push("\u041f\u0440\u043e\u0434\u0443\u043a\u0442 \u0432 \u0441\u0435\u0433\u043c\u0435\u043d\u0442\u0435: <strong>" + escapeHtml(leaves[0].name) + "</strong>.");
    } else {
      lines.push("<strong>" + leaves.length + " " + pluralProducts(leaves.length) + "</strong>: " +
        leaves.map(function (l) { return escapeHtml(l.name); }).join(", ") + ".");
    }
    lines.push("\u041f\u0438\u0440\u0430\u043c\u0438\u0434\u0430 L4\u2013L2 (\u0431\u0435\u0437 L1). L1 \u0438 operational-\u0434\u0435\u0442\u0430\u043b\u0438 \u2014 \u043d\u0430 \u043b\u0438\u0441\u0442\u043e\u0432\u043e\u043c \u043f\u0440\u043e\u0434\u0443\u043a\u0442\u0435.");
  }

  if (prof) {
    if (node.leaf && prof.lifecycle) {
      lines.push("\u042d\u0442\u0430\u043f \u0416\u0426: <strong>" + escapeHtml(prof.lifecycle) + "</strong>");
    }
    var hc = formatHeadcountLine(prof);
    if (hc) lines.push(hc);
  }

  if (info.owner) {
    lines.push('<span class="intro-owner">\u041e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0439: ' + escapeHtml(info.owner) + "</span>");
  }
  return lines.join("<br>");
}

function buildPyramidIntroBlock(productId) {

  return '<div class="pyramid-intro"><div class="pyramid-intro-main">' +

function renderMetricTreeValue(productId, met) {
  var t = getMetricTrend(productId, met.id);
  return '<span class="mtree-val">' + escapeHtml(formatMetricValue(t.fact, met.units, met)) + "</span>";
}

function getLevelRowLabel(lv) {
  var row = LEVELS.filter(function (l) { return l.id === lv; })[0];
  return row ? row.label : "L" + lv;
}

function buildProductGraphEdges(pmap) {
  var edges = [];
  var keys = {};
  function addEdge(from, to, type) {
    if (!from || !to || from === to) return;
    var key = from + "\0" + to + "\0" + type;
    if (keys[key]) return;
    keys[key] = true;
    edges.push({ from: from, to: to, type: type });
  }
  Object.keys(pmap).forEach(function (mid) {
    var inf = getInfluence(mid);
    if (!inf) return;
    (inf.drives || []).forEach(function (tid) { addEdge(tid, mid, "depends"); });
    (inf.feeds || []).forEach(function (tid) { addEdge(mid, tid, "influences"); });
  });
  return edges;
}

function collectExternalMetricIds(pmap, edges) {
  var ext = {};
  edges.forEach(function (e) {
    if (!pmap[e.from]) ext[e.from] = true;
    if (!pmap[e.to]) ext[e.to] = true;
  });
  return Object.keys(ext);
}

function getGraphFocusNodes(focusId, edges) {
  if (!focusId) return null;
  var set = {};
  set[focusId] = "focus";
  edges.forEach(function (e) {
    if (e.from === focusId) set[e.to] = set[e.to] || "related";
    if (e.to === focusId) set[e.from] = set[e.from] || "related";
  });
  return set;
}

function getGraphFocusEdges(focusId, edges) {
  if (!focusId) return [];
  return edges.filter(function (e) { return e.from === focusId || e.to === focusId; });
}

function renderMetricGraphNode(metricId, entry, productId, isExternal, focusMap) {
  var met = entry ? entry.metric : null;
  var lv = entry ? entry.level : (findMetricLocation(metricId) || {}).level || 0;
  var idx = buildMetricNameIndex();
  var name = met ? met.name : (idx[metricId] || metricId);
  var active = state.selectedMetric && state.selectedMetric.id === metricId ? " active" : "";
  var focusCls = "";
  if (focusMap) {
    if (focusMap[metricId] === "focus") focusCls = " focus";
    else if (focusMap[metricId] === "related") focusCls = " related";
    else focusCls = " dimmed";
  }
  var style = getMtreeLevelStyle(lv);
  var cls = "mgraph-node lvl-" + lv + active + focusCls + (isExternal ? " mgraph-node-external" : "");
  var html = '<button type="button" class="' + cls + '" data-metric-id="' + escapeHtml(metricId) + '" data-level="' + lv + '"' +
    ' style="--node-color:' + style.color + '"' +
    (isExternal ? ' data-external="1"' : "") + ">" +
    '<span class="mtree-badge">' + escapeHtml(style.badge) + "</span>" +
    '<span class="mtree-name">' + escapeHtml(metricShortLabel(name)) + "</span>";
  if (met && !isExternal) html += renderMetricTreeValue(productId, met);
  if (isExternal) html += '<span class="mgraph-ext-hint">вне продукта</span>';
  html += "</button>";
  return html;
}

function renderMetricGraphRows(productId, pmap, focusMap) {
  var html = "";
  [4, 3, 2, 1].forEach(function (lv) {
    var ids = Object.keys(pmap).filter(function (id) { return pmap[id].level === lv; });
    if (!ids.length) return;
    html += '<div class="mgraph-row" data-level="' + lv + '">' +
      '<div class="mgraph-row-label">' + escapeHtml(getLevelRowLabel(lv)) + "</div>";
    ids.forEach(function (id) {
      html += renderMetricGraphNode(id, pmap[id], productId, false, focusMap);
    });
    html += "</div>";
  });
  return html;
}

function drawMetricGraphEdges(root, edges, focusId) {
  var graph = root.querySelector(".mgraph");
  if (!graph) return;
  var svg = graph.querySelector(".mgraph-svg");
  if (!svg) return;
  var visibleEdges = focusId ? getGraphFocusEdges(focusId, edges) : [];
  if (!focusId) {
    svg.innerHTML = "";
    return;
  }
  var graphRect = graph.getBoundingClientRect();
  var pos = {};
  graph.querySelectorAll(".mgraph-node").forEach(function (node) {
    var id = node.getAttribute("data-metric-id");
    var r = node.getBoundingClientRect();
    pos[id] = {
      x: r.left + r.width / 2 - graphRect.left,
      y: r.top + r.height / 2 - graphRect.top,
      w: r.width,
      h: r.height
    };
  });
  var defs = '<defs>' +
    '<marker id="mgraph-arrow-depends" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">' +
    '<path d="M0,0 L8,4 L0,8 Z" fill="rgba(120,200,160,0.85)"/></marker>' +
    '<marker id="mgraph-arrow-influences" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">' +
    '<path d="M0,0 L8,4 L0,8 Z" fill="rgba(150,170,210,0.85)"/></marker></defs>';
  var paths = "";
  visibleEdges.forEach(function (e) {
    var from = pos[e.from];
    var to = pos[e.to];
    if (!from || !to) return;
    var dx = to.x - from.x;
    var dy = to.y - from.y;
    var dist = Math.sqrt(dx * dx + dy * dy) || 1;
    var ux = dx / dist;
    var uy = dy / dist;
    var x1 = from.x + ux * (from.w / 2 + 2);
    var y1 = from.y + uy * (from.h / 2 + 2);
    var x2 = to.x - ux * (to.w / 2 + 6);
    var y2 = to.y - uy * (to.h / 2 + 6);
    var cls = e.type === "influences" ? "influences" : "depends";
    var marker = e.type === "influences" ? "mgraph-arrow-influences" : "mgraph-arrow-depends";
    var sameRow = Math.abs(from.y - to.y) < 28;
    var d;
    if (sameRow) {
      var arcY = y1 - 26;
      d = "M" + x1 + "," + y1 + " C" + x1 + "," + arcY + " " + x2 + "," + arcY + " " + x2 + "," + y2;
    } else {
      var midY = (y1 + y2) / 2;
      d = "M" + x1 + "," + y1 + " C" + x1 + "," + midY + " " + x2 + "," + midY + " " + x2 + "," + y2;
    }
    paths += '<path class="mgraph-path mgraph-path-' + cls + '" d="' + d + '" marker-end="url(#' + marker + ')"/>';
  });
  svg.setAttribute("width", graphRect.width);
  svg.setAttribute("height", graphRect.height);
  svg.innerHTML = defs + paths;
}

function renderMetricTree(productId) {
  var pmap = getProductMetricMap(productId);
  var edges = buildProductGraphEdges(pmap);
  var externalIds = collectExternalMetricIds(pmap, edges);
  var focusId = state.graphFocusMetricId;
  var focusMap = getGraphFocusNodes(focusId, edges);
  var rowsHtml = renderMetricGraphRows(productId, pmap, focusMap);
  var externalHtml = "";
  if (externalIds.length) {
    externalHtml = '<div class="mgraph-row mgraph-row-external"><div class="mgraph-row-label">Связи вне продукта (rollup)</div>';
    externalIds.forEach(function (eid) {
      externalHtml += renderMetricGraphNode(eid, null, productId, true, focusMap);
    });
    externalHtml += "</div>";
  }
  var hintMsg = focusId
    ? "Подсвечены прямые связи: сплошная зелёная — «зависит от» (к выбранной); пунктир — «влияет на» (от выбранной)."
    : "Кликните по метрике — покажем только её прямые связи. Без выбора стрелки скрыты.";
  return '<div class="mtree-wrap"><div class="mtree-card">' +
    '<div class="mtree-toolbar">' +
    '<div class="mtree-toolbar-title"><b>Дерево метрик</b> · L4→L1</div>' +
    '<div class="mtree-legend-inline">' +
    '<span><i style="background:var(--mtree-l4)"></i>Outcome</span>' +
    '<span><i style="background:var(--mtree-l3)"></i>Product</span>' +
    '<span><i style="background:var(--mtree-l2)"></i>Flow</span>' +
    '<span><i style="background:var(--mtree-l1)"></i>Activity</span>' +
    '<span class="mgraph-legend-arrows">' +
    '<span><i class="mgraph-legend-line"></i>зависит от</span>' +
    '<span><i class="mgraph-legend-line infl"></i>влияет на</span>' +
    "</span></div></div>" +
    '<div class="mtree-guide"><span class="mtree-guide-icon">i</span><span><b>Как читать:</b> ' + hintMsg + "</span></div>" +
    (!focusId ? '<div class="mgraph-empty-hint">Связи скрыты · выберите метрику на схеме</div>' : "") +
    '<div class="mgraph mtree-canvas">' +
    '<svg class="mgraph-svg"></svg>' +
    (rowsHtml || '<div class="mgraph-row"><span style="color:var(--text-muted);font-size:0.8rem">Нет метрик</span></div>') +
    externalHtml +
    "</div></div></div>";
}

function bindMetricTreeEvents(root, productId) {
  var pmap = getProductMetricMap(productId);
  var edges = buildProductGraphEdges(pmap);
  root.querySelectorAll(".mgraph-node").forEach(function (node) {
    node.addEventListener("click", function () {
      var mid = node.getAttribute("data-metric-id");
      var external = node.getAttribute("data-external") === "1";
      if (external) {
        navigateToMetric(mid);
        return;
      }
      var entry = pmap[mid];
      if (!entry) return;
      closeGuide();
      state.graphFocusMetricId = mid;
      state.centerView = "metrics";
      state.metricsLayout = "tree";
      state.selectedMetric = entry.metric;
      state.selectedLevel = entry.level;
      state.passportOpen = true;
      renderAll();
    });
  });
  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      drawMetricGraphEdges(root, edges, state.graphFocusMetricId);
    });
  });
}

function taskStatusClass(status) {

function metricShortLabel(name) {

  var dash = name.indexOf(" \u2014 ");

  return name.length > 28 ? name.slice(0, 28) + "\u2026" : name;

function getMetricAbbrevExpansion(met) {
  if (!met || !met.name) return "";
  var dash = met.name.match(/^([A-Za-z\u0410-\u042f\u0401\u0451][A-Za-z\u0410-\u042f\u0401\u04510-9.\s]+?)\s*[\u2014\u2013-]\s*(.+)$/);
  if (dash) return dash[1].trim() + " \u2014 " + dash[2].trim();
  var lead = met.name.match(/^([A-Z]{2,})\b/);
  if (lead && METRIC_ABBREV_EXTRA[lead[1]]) {
    return lead[1] + " \u2014 " + METRIC_ABBREV_EXTRA[lead[1]];
  }
  return "";
}

var METRIC_NAME_BY_ID = null;
function buildMetricNameIndex() {
  if (METRIC_NAME_BY_ID) return METRIC_NAME_BY_ID;
  METRIC_NAME_BY_ID = {};
  Object.keys(METRICS_BY_PRODUCT).forEach(function (pid) {
    var pd = METRICS_BY_PRODUCT[pid];
    [4, 3, 2, 1].forEach(function (lv) {
      (pd.metrics[lv] || []).forEach(function (met) {
        METRIC_NAME_BY_ID[met.id] = met.name;
      });
    });
  });
  return METRIC_NAME_BY_ID;
}

function findMetricLocation(metricId) {
  var flat = getFlatTree();
  var i, j, lv, pid, pd, list;
  for (i = 0; i < flat.length; i++) {
    pid = flat[i].node.id;
    pd = getProductData(pid);
    for (lv = 4; lv >= 1; lv--) {
      list = pd.metrics[lv] || [];
      for (j = 0; j < list.length; j++) {
        if (list[j].id === metricId) {
          return { productId: pid, level: lv, metric: list[j] };
        }
      }
    }
  }
  return null;
}

function navigateToMetric(metricId) {
  var loc = findMetricLocation(metricId);
  if (!metricId || !loc) return false;
  closeGuide();
  state.appView = "workspace";
  state.centerView = "metrics";
  selectProduct(loc.productId, metricId);
  return true;
}

function renderAppShell() {
  var app = document.querySelector(".app");
  var homeRoot = document.getElementById("homeRoot");
  var workspaceRoot = document.getElementById("workspaceRoot");
  var headerMain = document.getElementById("headerMain");
  var headerNav = document.getElementById("headerNav");
  var isHome = state.appView === "home";
  var prevView = renderAppShell._prevView;
  if (app) {
    app.classList.toggle("app-view-home", isHome);
    app.classList.toggle("app-view-workspace", !isHome);
  }
  if (homeRoot) homeRoot.setAttribute("aria-hidden", isHome ? "false" : "true");
  if (workspaceRoot) workspaceRoot.setAttribute("aria-hidden", isHome ? "true" : "false");
  if (headerMain) headerMain.hidden = isHome;
  if (headerNav) {
    headerNav.querySelectorAll("[data-app-view]").forEach(function (btn) {
      btn.classList.toggle("active", btn.getAttribute("data-app-view") === state.appView);
    });
  }
  if (prevView !== undefined && prevView !== state.appView) {
    window.scrollTo(0, 0);
  }
  renderAppShell._prevView = state.appView;
}

function getSelectedProductName() {
  var path = findPath(PRODUCT_TREE, state.selectedProduct) || [];
  return path.length ? path[path.length - 1].name : "\u0411\u043b\u043e\u043a \u0422";
}


function setAppView(view) {
  if (state.appView === view) {
    renderAppShell();
    if (view === "home") renderHome();
    return;
  }
  state.appView = view;
  closeGuide();
  state.passportOpen = false;
  if (view === "home") {
    renderAppShell();
    renderHome();
  } else {
    if (!state.selectedProduct) state.selectedProduct = "blok-t";
    renderAll();
  }
}

function openWorkspace(productId, opts) {
  opts = opts || {};
  closeGuide();
  state.appView = "workspace";
  state.selectedProduct = productId || "blok-t";
  state.selectedMetric = null;
  state.selectedLevel = null;
  state.passportOpen = false;
  state.graphFocusMetricId = null;
  state.centerView = "metrics";
  if (!isLeafProduct(state.selectedProduct)) {
    state.metricsLayout = "pyramid";
  }
  if (opts.metricId) {
    var loc = findMetricLocation(opts.metricId);
    if (loc) {
      state.selectedProduct = loc.productId;
      state.selectedMetric = loc.metric;
      state.selectedLevel = loc.level;
      state.passportOpen = true;
    }
  } else if (opts.description && isLeafProduct(state.selectedProduct)) {
    state.centerView = "description";
  }
  expandTreePath(state.selectedProduct);
  renderAll();
}

function renderHomeSignalsHtml() {
  var html = renderHomeClusterStripHtml();
  var signals = [];
  var severityOrder = { critical: 0, warn: 1, good: 2 };
  var severityLabels = { critical: "Критично", warn: "Внимание", good: "Ок" };
  (LEADER_HOME.watchMetrics || []).forEach(function (mid) {
    var brief = getMetricBrief(mid);
    if (!brief) return;
    var t = brief.trend;
    if (t.deltaCls === "down") {
      var severity = Math.abs(t.deltaPct) >= 8 ? "critical" : "warn";
      signals.push({
        severity: severity,
        text: metricShortLabel(brief.met.name) + " \u2014 \u043e\u0442\u043a\u043b\u043e\u043d\u0435\u043d\u0438\u0435 \u043e\u0442 \u043f\u043b\u0430\u043d\u0430 (" + t.deltaSign + t.deltaPct.toFixed(1) + "%)",
        metricId: mid
      });
    } else {
      signals.push({
        severity: "good",
        text: metricShortLabel(brief.met.name) + " \u2014 \u0432 \u0434\u043e\u043f\u0443\u0441\u043a\u0435 (" + t.deltaSign + t.deltaPct.toFixed(1) + "%)",
        metricId: mid
      });
    }
  });
  signals.sort(function (a, b) {
    return (severityOrder[a.severity] || 9) - (severityOrder[b.severity] || 9);
  });
  if (!signals.length) {
    signals.push({
      severity: "good",
      text: "\u041a\u043b\u044e\u0447\u0435\u0432\u044b\u0435 watch-\u043c\u0435\u0442\u0440\u0438\u043a\u0438 \u0432 \u0434\u043e\u043f\u0443\u0441\u043a\u0435 \u043f\u043e \u043f\u043b\u0430\u043d\u0443",
      metricId: null
    });
  }
  return html + signals.slice(0, 8).map(function (s) {
    var dotCls = s.severity;
    var tag = severityLabels[s.severity] || "";
    var body = s.metricId
      ? '<button type="button" data-goto-metric="' + escapeHtml(s.metricId) + '">' + escapeHtml(s.text) + "</button>"
      : escapeHtml(s.text);
    return '<div class="home-signal"><span class="home-signal-dot ' + dotCls + '"></span><div>' +
      (tag ? '<span class="home-signal-tag ' + dotCls + '">' + escapeHtml(tag) + "</span>" : "") +
      body + "</div></div>";
  }).join("");
}

    if (prodBtn) {
      var pid = prodBtn.getAttribute("data-open-product");
      var mode = prodBtn.getAttribute("data-open-mode");
      openWorkspace(pid, { description: mode === "description" });
      return;
    }
    var wsBtn = e.target.closest("[data-open-workspace]");
    if (wsBtn) {
      openWorkspace(wsBtn.getAttribute("data-open-workspace") || "blok-t", {});
      return;
    }
    var guideBtn = e.target.closest("[data-open-catalog]");
    if (guideBtn) {
      openGuide();
      return;
    }
  });
}

function getDomainMeta(productId) {

function getLayerHint(domain, levelId) {
  var hints = LAYER_HINTS[domain] || LAYER_HINTS.internal;
  return hints[levelId] || "";
}

function getHierarchyScope(productId) {
  var node = getTreeNode(productId);
  if (!node) return "block";
  if (node.leaf) return "leaf";
  if (node.id === "blok-t") return "block";
  if (node.level === "\u043a\u043b\u0430\u0441\u0442\u0435\u0440") return "cluster";
  if (node.level === "\u0441\u0435\u0433\u043c\u0435\u043d\u0442") return "segment";
  return "cluster";
}

function getVisibleLevels(productId) {
  if (getHierarchyScope(productId) === "leaf") return [4, 3, 2, 1];
  return [4, 3, 2];
}

function getLevelBridge(productId, levelId) {
  var scope = getHierarchyScope(productId);
  var bridges = LEVEL_BRIDGES_BY_SCOPE[scope] || LEVEL_BRIDGES_BY_SCOPE.leaf;
  return bridges[levelId] || null;
}

function getMetricUnitsText(met) {
  if (!met) return "";
  return (met.units || "") + " " + ((met.passport && met.passport.units) || "");
}

function getMetricScaleKind(met) {
  if (!met) return "generic";
  var u = getMetricUnitsText(met);
  if (met.cluster === "CSI" || u.indexOf("1\u201310") >= 0 || u.indexOf("1-10") >= 0) return "csi";
  if (met.cluster === "CSAT" || (u.indexOf("1\u20135") >= 0 && u.indexOf("10") < 0) || (u.indexOf("1-5") >= 0 && u.indexOf("10") < 0)) return "csat";
  if (met.cluster === "Health" && u.indexOf("\u0431\u0430\u043b\u043b") >= 0) return "csat";
  if (u.indexOf("%") >= 0) return "percent";
  if (u.indexOf("\u043c\u043b\u043d") >= 0) return "money";
  if (u.indexOf("\u20bd/\u044e\u043d\u0438\u0442") >= 0 || (u.indexOf("\u20bd") >= 0 && u.indexOf("\u043c\u043b\u043d") < 0)) return "unitCost";
  if (u.indexOf("\u0434\u043d") >= 0 || u.indexOf("\u0447") >= 0 || u.indexOf("\u043c\u0438\u043d") >= 0) return "duration";
  return "generic";
}

function getMetricPolarity(met) {
  if (!met) return "higher";
  var id = met.id || "";
  var name = met.name || "";
  if (/-net$/.test(id) || /-roi$/.test(id) || id === "ai-val" || id === "id-loss" || id === "ic-loss" || id === "idev-ben") return "higher";
  if (LOWER_BETTER_METRIC_IDS[id]) return "lower";
  if (/-(tco|cod|col|cpw|tcost|iod|ttm|ttv|mtr|cfr|lat|manual|fix|skip)$/.test(id)) return "lower";
  if (id === "ai-aue" || id === "ai-col" || id === "id2-t" || id === "ai-disc" || id === "ai-lt" || id === "ic-rlt") return "lower";
  if (/^TCO\b|Cost of downtime|CoL \u2014|\u2014 CoL|CPW|time-to-|lead time|MTTR|\u0434\u0440\u0435\u0439\u0444|fail rate|\u0440\u0430\u0441\u0445\u043e\u0434 \u043d\u0430 \u0442\u043e\u043a\u0435\u043d/i.test(name)) return "lower";
  if (/\u0447\u0438\u0441\u0442\u044b\u0439 \u044d\u0444\u0444\u0435\u043a\u0442|net value|\u044d\u0444\u0444\u0435\u043a\u0442 \u0443\u0441\u043a\u043e\u0440\u0435\u043d\u0438\u044f/i.test(name)) return "higher";
  return "higher";
}

function computeMetricDelta(met, fact, plan) {
  var rawPct = plan ? ((fact - plan) / plan) * 100 : 0;
  var lower = getMetricPolarity(met) === "lower";
  var isGood = lower ? fact <= plan : fact >= plan;
  return {
    rawPct: rawPct,
    deltaCls: isGood ? "up" : "down",
    deltaSign: rawPct >= 0 ? "+" : "",
    lower: lower
  };
}

function formatMetricValue(val, units, met) {
  if (val == null || isNaN(val)) return "\u2014";
  var n = Math.abs(val);
  var u = units || "";
  var kind = met ? getMetricScaleKind(met) : "generic";
  var formatted;
  if (kind === "csi" || kind === "csat") formatted = val.toFixed(1);
  else if (u.indexOf("%") >= 0 || u.indexOf("\u0431\u0430\u043b\u043b") >= 0) formatted = val.toFixed(1);
  else if (n >= 1000) formatted = val.toFixed(0);
  else if (n >= 10) formatted = val.toFixed(1);
  else formatted = val.toFixed(2);
  return formatted + (u ? " " + u : "");
}

function renderHierarchyGuideTree(node, depth) {
  depth = depth || 0;
  var rollup = PRODUCT_HIERARCHY_ROLLUP[node.id];
  var html = '<div class="hierarchy-guide-node" style="margin-left:' + (depth * 14) + 'px">';
  html += '<div class="hg-name">' + escapeHtml(node.name);
  if (node.level) html += '<span class="hg-type">' + escapeHtml(node.level) + "</span>";
  html += "</div>";
  if (rollup && rollup.chain) {
    html += '<div class="hg-chain">' + escapeHtml(rollup.chain) + "</div>";
    html += '<div class="hg-text">' + escapeHtml(rollup.text) + "</div>";
  } else if (node.leaf) {
    html += '<div class="hg-text">\u041b\u0438\u0441\u0442\u043e\u0432\u043e\u0439 \u043f\u0440\u043e\u0434\u0443\u043a\u0442: \u043f\u043e\u043b\u043d\u0430\u044f \u043f\u0438\u0440\u0430\u043c\u0438\u0434\u0430 L1\u2013L4 \u0438 \u043e\u043f\u0438\u0441\u0430\u043d\u0438\u0435.</div>';
  } else if (node.children && node.children.length) {
    html += '<div class="hg-text">\u0421\u0432\u043e\u0434\u043d\u044b\u0435 \u043c\u0435\u0442\u0440\u0438\u043a\u0438; drill-down \u2014 \u0432 \u0434\u043e\u0447\u0435\u0440\u043d\u0438\u0435 \u0443\u0437\u043b\u044b.</div>';
  }
  html += "</div>";
  if (node.children) {
    node.children.forEach(function (ch) {
      html += renderHierarchyGuideTree(ch, depth + 1);
    });
  }
  return html;
}

function isLeafProduct(id) {
  var path = findPath(PRODUCT_TREE, id);

  var node = path[path.length - 1];

}

function hashSeed(str) {
  var h = 0;
  for (var i = 0; i < str.length; i++) h = ((h << 5) - h) + str.charCodeAt(i) | 0;
  return Math.abs(h);
}

function clampMetricValue(val, met) {
  if (!met || val == null || isNaN(val)) return val;
  var kind = getMetricScaleKind(met);
  if (kind === "csi") return Math.min(10, Math.max(1, val));
  if (kind === "csat") return Math.min(5, Math.max(1, val));
  if (kind === "percent") return Math.min(100, Math.max(0, val));
  return val;
}

function genChartData(productId, metricId) {
  var loc = metricId ? findMetricLocation(metricId) : null;
  var met = loc ? loc.metric : null;
  var seed = hashSeed((metricId || productId) + "chart");
  var mult = (met && met.chartSeed) ? met.chartSeed : 1;
  var kind = getMetricScaleKind(met);
  var lower = getMetricPolarity(met) === "lower";
  var points = [];
  for (var p = 0; p < 12; p++) {
    var r = ((seed + p * 17) % 100) / 100;
    var r2 = ((seed + p * 31) % 100) / 100;
    var plan, fact;
    if (kind === "csi") {
      plan = 8.1 + (r - 0.5) * 0.8;
      fact = plan + (r2 - 0.46) * 0.7 * mult;
    } else if (kind === "csat") {
      plan = 4.0 + (r - 0.5) * 0.5;
      fact = plan + (r2 - 0.44) * 0.45 * mult;
    } else if (kind === "percent") {
      plan = lower ? 10 + r * 12 : 72 + r * 18;
      fact = plan * (lower ? (1.02 - r2 * 0.18) : (0.9 + r2 * 0.14)) * (lower ? 1 : mult);
    } else if (kind === "money" || kind === "unitCost") {
      plan = (kind === "unitCost" ? 1800 : 22) + r * (kind === "unitCost" ? 2200 : 48);
      fact = plan * (lower ? (0.94 + r2 * 0.14) : (0.9 + r2 * 0.16)) * mult;
    } else if (kind === "duration") {
      plan = 14 + r * 28;
      fact = plan * (0.9 + r2 * 0.2) * mult;
    } else {
      plan = 35 + r * 50;
      fact = plan * (0.88 + r2 * 0.18) * mult;
    }
    plan = clampMetricValue(plan, met);
    fact = clampMetricValue(fact, met);
    points.push({ label: CHART_MONTHS[p], plan: plan, fact: fact });
  }
  return points;
}

function getMetricTrend(productId, metricId) {
  var loc = findMetricLocation(metricId);
  var met = loc ? loc.metric : null;
  var points = genChartData(productId, metricId);
  var last = points[points.length - 1];
  var delta = computeMetricDelta(met, last.fact, last.plan);
  return {
    fact: last.fact,
    plan: last.plan,
    deltaPct: delta.rawPct,
    deltaCls: delta.deltaCls,
    deltaSign: delta.deltaSign,
    lower: delta.lower
  };
}

function renderMetricValueHtml(productId, met) {
  var t = getMetricTrend(productId, met.id);
  var titleAttr = t.lower ? ' title="\u043c\u0435\u043d\u044c\u0448\u0435 \u043f\u043b\u0430\u043d\u0430 \u2014 \u043b\u0443\u0447\u0448\u0435"' : "";
  return '<div class="m-value-row">' +
    '<span class="m-fact">' + escapeHtml(formatMetricValue(t.fact, met.units, met)) + "</span>" +
    '<span class="m-plan">\u043f\u043b\u0430\u043d ' + escapeHtml(formatMetricValue(t.plan, met.units, met)) + "</span>" +
    '<span class="m-delta ' + t.deltaCls + '"' + titleAttr + ">" + t.deltaSign + t.deltaPct.toFixed(1) + "%</span></div>";
}

function navigateBreadcrumb(productId) {
  if (!productId) return;
  if (productId === state.selectedProduct && state.selectedMetric) {
    state.selectedMetric = null;
    state.selectedLevel = null;
    state.passportOpen = false;
    renderAll();
    return;
  }
  if (productId !== state.selectedProduct) selectProduct(productId);
}

function renderBreadcrumbs() {
  var el = document.getElementById("breadcrumb");
  var path = findPath(PRODUCT_TREE, state.selectedProduct) || [PRODUCT_TREE];
  var domain = getDomain(state.selectedProduct);
  var dmeta = DOMAINS[domain];
  var html = '<span class="domain-crumb">' + escapeHtml(dmeta.label) + "</span><span class=\"sep\">/</span>";
  path.forEach(function (n, idx) {
    if (idx > 0) html += '<span class="sep">/</span>';
    var cls = "crumb is-link" + (idx === path.length - 1 ? " is-current" : "");
    html += '<button type="button" class="' + cls + '" data-crumb-product="' + n.id + '">' + escapeHtml(n.name) + "</button>";
  });
  el.innerHTML = html;
  el.querySelectorAll("[data-crumb-product]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      navigateBreadcrumb(btn.getAttribute("data-crumb-product"));
    });
  });
  var mc = document.getElementById("metricCrumb");
  if (state.selectedMetric) {
    mc.textContent = state.selectedMetric.name;
    mc.hidden = false;
  } else {
    mc.hidden = true;
  }
}

function scrollToActiveMetric() {
  if (!state.selectedMetric || state.centerView !== "metrics") return;
  requestAnimationFrame(function () {
    var card = document.querySelector(".metric-card.active, .mgraph-node.active, .mtree-node.active");
    if (card) card.scrollIntoView({ block: "nearest", behavior: "smooth" });
  });
}

function renderTreeNodeHtml(node, pathIds) {
  var hasChildren = node.children && node.children.length;
  var isCollapsed = !!state.treeCollapsed[node.id];
  var cls = "tree-node";
  if (node.id === state.selectedProduct) cls += " active";
  if (pathIds.indexOf(node.id) >= 0 && node.id !== state.selectedProduct) cls += " on-path";
  var html = '<div class="tree-branch" data-tree-branch="' + node.id + '"><div class="tree-row">';
  if (hasChildren) {
    html += '<button type="button" class="tree-toggle' + (isCollapsed ? " collapsed" : "") +
      '" data-tree-toggle="' + node.id + '" aria-label="\u0420\u0430\u0441\u043a\u0440\u044b\u0442\u044c \u0432\u043b\u043e\u0436\u0435\u043d\u043d\u043e\u0441\u0442\u044c">\u25be</button>';
  } else {
    html += '<span class="tree-toggle-spacer" aria-hidden="true"></span>';
  }
  html += '<button type="button" class="' + cls + '" data-id="' + node.id + '">' +
    '<span class="node-title">' + escapeHtml(node.name) + "</span></button></div>";
  if (hasChildren && !isCollapsed) {
    html += '<div class="tree-children">';
    node.children.forEach(function (ch) {
      html += renderTreeNodeHtml(ch, pathIds);
    });
    html += "</div>";
  }
  html += "</div>";
  return html;
}

function renderTree() {
  var root = document.getElementById("treeRoot");
  var q = (state.productSearch || "").trim().toLowerCase();
  if (q) {
    var flat = getFlatTree();
    var matches = flat.filter(function (item) {
      return item.node.name.toLowerCase().indexOf(q) >= 0;
    });
    if (!matches.length) {
      root.innerHTML = '<div class="tree-search-results" style="padding:12px;color:var(--text-muted);font-size:0.78rem">Ничего не найдено</div>';
      return;
    }
    root.innerHTML = '<div class="tree-search-results">' + matches.map(function (item) {
      var path = item.path.slice(0, -1).map(function (n) { return n.name; }).join(" / ");
      return '<button type="button" class="tree-search-hit" data-id="' + escapeHtml(item.node.id) + '">' +
        escapeHtml(item.node.name) +
        (path ? '<span class="tree-search-path">' + escapeHtml(path) + "</span>" : "") +
        "</button>";
    }).join("") + "</div>";
    root.querySelectorAll(".tree-search-hit").forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.productSearch = "";
        var inp = document.getElementById("productSearch");
        if (inp) inp.value = "";
        selectProduct(btn.getAttribute("data-id"));
      });
    });
    return;
  }
  var pathIds = (findPath(PRODUCT_TREE, state.selectedProduct) || []).map(function (n) { return n.id; });
  root.innerHTML = renderTreeNodeHtml(PRODUCT_TREE, pathIds);
  root.querySelectorAll(".tree-node").forEach(function (btn) {
    btn.addEventListener("click", function () {
      selectProduct(btn.getAttribute("data-id"));
    });
  });
  root.querySelectorAll("[data-tree-toggle]").forEach(function (btn) {
    btn.addEventListener("click", function (e) {
      e.stopPropagation();
      toggleTreeNode(btn.getAttribute("data-tree-toggle"));
    });
  });
}

function renderPyramid() {
  var root = document.getElementById("pyramidRoot");
  renderPyramidPanelHead();
  if (state.centerView === "description" && isLeafProduct(state.selectedProduct)) {
    root.innerHTML = '<div class="workspace-center-view">' + buildProductDescriptionHtml(state.selectedProduct) + "</div>";
    bindPyramidRootEvents(root);
    return;
  }
  if (state.metricsLayout === "tree" && isLeafProduct(state.selectedProduct)) {
    var treeProductId = state.selectedProduct;
    var introTree = buildPyramidIntroBlock(treeProductId);
    root.innerHTML = '<div class="workspace-center-view">' + introTree + renderMetricTree(treeProductId) + "</div>";
    bindMetricTreeEvents(root, treeProductId);
    bindPyramidRootEvents(root);
    return;
  }
  var data = getProductData(state.selectedProduct);
  var domain = getDomain(state.selectedProduct);
  var productId = state.selectedProduct;
  var intro = buildPyramidIntroBlock(productId);
  var visibleLevels = getVisibleLevels(productId);
  var scope = getHierarchyScope(productId);
  var levelsHtml = "";
  var levelIdx = 0;
  LEVELS.forEach(function (lv) {
    if (visibleLevels.indexOf(lv.id) < 0) return;
    var metrics = data.metrics[lv.id] || [];
    var layerHint = getLayerHint(domain, lv.id);
    var cards = metrics.map(function (met) {
      var active = state.selectedMetric && state.selectedMetric.id === met.id ? " active" : "";
      var inf = getInfluence(met.id);
      var infHtml = formatInfluenceHtml(inf);
      var linkCls = infHtml ? " has-link" : "";
      return '<div class="metric-card' + active + linkCls + '" role="button" tabindex="0" data-metric-id="' + met.id + '" data-level="' + lv.id + '">' +
        '<span class="m-level">L' + lv.id + "</span>" +
        '<span class="m-name">' + escapeHtml(met.name) + "</span>" +
        renderMetricValueHtml(productId, met) +
        '<span class="m-row">' +
        '<span class="m-tag">' + escapeHtml(met.cluster) + "</span>" +
        '<span class="m-tag">' + escapeHtml(met.owner) + "</span></span>" +
        infHtml + "</div>";
    }).join("");
    var bridgeText = getLevelBridge(productId, lv.id);
    var bridge = bridgeText ? '<div class="level-bridge"><b>L' + lv.id + " \u2192</b> " + escapeHtml(bridgeText) + "</div>" : "";
    levelsHtml += '<div class="level-block" data-level="' + lv.id + '">' +
      '<div class="level-header"><span class="level-label">' + escapeHtml(lv.label) + '</span><span class="level-tagline">' + escapeHtml(lv.tagline) + "</span></div>" +
      '<div class="level-hint">' + escapeHtml(layerHint) + "</div>" +
      '<div class="level-metrics">' + (cards || '<span style="color:var(--text-muted);font-size:0.8rem">\u041d\u0435\u0442 \u043c\u0435\u0442\u0440\u0438\u043a</span>') + "</div>" +
      bridge + "</div>";
    if (levelIdx < visibleLevels.length - 1) {
      levelsHtml += '<div class="level-flow-arrow" title="\u0412\u043b\u0438\u044f\u043d\u0438\u0435 \u0441\u043d\u0438\u0437\u0443 \u0432\u0432\u0435\u0440\u0445">\u25bc</div>';
    }
    levelIdx++;
  });
  if (scope !== "leaf") {
    levelsHtml += '<div class="level-rollup-note">L1 (\u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c \u043a\u043e\u043c\u0430\u043d\u0434 \u0438 runtime) \u043f\u043e\u043a\u0430\u0437\u044b\u0432\u0430\u0435\u0442\u0441\u044f \u0442\u043e\u043b\u044c\u043a\u043e \u043d\u0430 \u043b\u0438\u0441\u0442\u043e\u0432\u043e\u043c \u043f\u0440\u043e\u0434\u0443\u043a\u0442\u0435. \u0417\u0434\u0435\u0441\u044c \u2014 \u0441\u0432\u043e\u0434 L4\u2013L2.</div>';
  }
  var hintHtml = "";
  if (!state.selectedMetric) {
    hintHtml = '<div class="pyramid-hint"><strong>\u0421\u043b\u0435\u0434\u0443\u044e\u0449\u0438\u0439 \u0448\u0430\u0433:</strong> \u0432\u044b\u0431\u0435\u0440\u0438\u0442\u0435 \u043c\u0435\u0442\u0440\u0438\u043a\u0443 \u2014 \u043e\u0442\u043a\u0440\u043e\u0435\u0442\u0441\u044f \u043f\u0430\u0441\u043f\u043e\u0440\u0442 \u0438 \u0434\u0435\u0442\u0430\u043b\u044c\u043d\u044b\u0439 \u0433\u0440\u0430\u0444\u0438\u043a \u0441\u043f\u0440\u0430\u0432\u0430. \u0421\u0432\u044f\u0437\u0438 \u00ab\u2191 / \u2193\u00bb \u0432\u0435\u0434\u0443\u0442 \u043a \u0441\u0432\u044f\u0437\u0430\u043d\u043d\u044b\u043c \u043f\u043e\u043a\u0430\u0437\u0430\u0442\u0435\u043b\u044f\u043c.</div>';
  }
  root.innerHTML = '<div class="workspace-center-view">' + intro + hintHtml + levelsHtml + "</div>";
  bindPyramidRootEvents(root);
  scrollToActiveMetric();
}

function bindPyramidRootEvents(root) {
  root.querySelectorAll(".metric-card").forEach(function (card) {
    card.addEventListener("click", function (e) {
      if (e.target.closest("[data-goto-metric]")) return;
      var mid = card.getAttribute("data-metric-id");
      var lv = parseInt(card.getAttribute("data-level"), 10);
      var data = getProductData(state.selectedProduct);
      var found = null;
      (data.metrics[lv] || []).forEach(function (met) {
        if (met.id === mid) found = met;
      });
      if (found) {
        closeGuide();
        state.centerView = "metrics";
        state.selectedMetric = found;
        state.selectedLevel = lv;
        state.passportOpen = true;
        renderAll();
      }
    });
    card.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        card.click();
      }
    });
  });
}

function renderPassport() {
  var panel = document.getElementById("passport");
  var overlay = document.getElementById("passportOverlay");
  var body = document.getElementById("passportBody");
  var title = document.getElementById("passportTitle");
  var abbrEl = document.getElementById("passportAbbr");
  if (!state.selectedMetric || !state.passportOpen) {
    panel.classList.remove("open");
    overlay.classList.remove("open");
    return;
  }
  var p = state.selectedMetric.passport;
  var lv = state.selectedLevel;
  var meta = lv ? LEVEL_META[lv] : null;
  title.textContent = state.selectedMetric.name;
  var abbr = getMetricAbbrevExpansion(state.selectedMetric);
  if (abbrEl) {
    if (abbr) {
      abbrEl.textContent = abbr;
      abbrEl.hidden = false;
    } else {
      abbrEl.textContent = "";
      abbrEl.hidden = true;
    }
  }
  var lvDef = lv ? LEVELS.filter(function (l) { return l.id === lv; })[0] : null;
  var levelBlock = lv && lvDef
    ? '<span class="passport-level">L' + lv + " \u00b7 " + escapeHtml(lvDef.label) + "</span>" +
      (meta ? '<p class="passport-audience">Для кого: ' + escapeHtml(meta.audience) + " \u00b7 Каденс: " + escapeHtml(meta.cadence) + "</p>" : "")
    : "";
  var inf = getInfluence(state.selectedMetric.id);
  var infHtml = formatInfluenceHtml(inf);
  var infBlock = infHtml
    ? '<div class="passport-field full"><label>Влияние в пирамиде</label><div class="val">' + infHtml + "</div></div>"
    : "";
  var fields = [
    ["Что меряет", p.what, false],
    ["На какой вопрос отвечает", p.question, false],
    ["Формула", p.formula, true],
    ["Единицы", p.units, false],
    ["Временное окно", p.window, false],
    ["Источник данных", p.source, false],
    ["Частота замера", p.freq, false],
    ["Ответственный", p.owner, false]
  ];
  body.innerHTML = levelBlock + '<div class="passport-grid">' + infBlock + fields.map(function (f) {
    var cls = f[2] ? "passport-field full" : "passport-field";
    return '<div class="' + cls + '"><label>' + escapeHtml(f[0]) + '</label><div class="val">' + escapeHtml(f[1]) + "</div></div>";
  }).join("") + "</div>";
  panel.classList.add("open");
  overlay.classList.add("open");
}

function renderCharts() {
  var root = document.getElementById("chartsRoot");
  var path = findPath(PRODUCT_TREE, state.selectedProduct) || [];
  var prodName = path.length ? path[path.length - 1].name : "—";
  if (!state.selectedProduct) {
    root.innerHTML = '<div class="chart-empty"><span class="chart-empty-icon" aria-hidden="true">\u25e6</span>\u0412\u044b\u0431\u0435\u0440\u0438\u0442\u0435 \u043f\u0440\u043e\u0434\u0443\u043a\u0442 \u0432 \u0438\u0435\u0440\u0430\u0440\u0445\u0438\u0438 \u0441\u043b\u0435\u0432\u0430</div>';
    return;
  }
  var domain = getDomain(state.selectedProduct);
  var dmeta = getDomainMeta(state.selectedProduct);
  var metric = state.selectedMetric;
  var title = metric ? metric.name : "Сводный контекст: " + prodName;
  var sub = metric
    ? dmeta.chartSub + " · " + metric.units
    : dmeta.chartSubAgg;
  var points = genChartData(state.selectedProduct, metric ? metric.id : null);
  var maxVal = Math.max(1, Math.max.apply(null, points.map(function (pt) { return Math.max(pt.plan, pt.fact); })));
  var planTitle = dmeta.kpiPlan;
  var factTitle = dmeta.kpiFact;
  var bars = points.map(function (pt) {
    var ph = Math.round((pt.plan / maxVal) * 100);
    var fh = Math.round((pt.fact / maxVal) * 100);
    var planPctMax = (pt.plan / maxVal * 100).toFixed(0);
    var factPctMax = (pt.fact / maxVal * 100).toFixed(0);
    var factVsPlan = pt.plan > 0 ? (pt.fact / pt.plan * 100).toFixed(0) : "\u2014";
    var planFmt = metric ? formatMetricValue(pt.plan, metric.units, metric) : pt.plan.toFixed(1);
    var factFmt = metric ? formatMetricValue(pt.fact, metric.units, metric) : pt.fact.toFixed(1);
    var tip = pt.label + ": \u043f\u043b\u0430\u043d " + planFmt + " (" + planPctMax + "% \u043e\u0442 \u043c\u0430\u043a\u0441.), \u0444\u0430\u043a\u0442 " +
      factFmt + " (" + factPctMax + "% \u043e\u0442 \u043c\u0430\u043a\u0441., " + factVsPlan + "% \u043a \u043f\u043b\u0430\u043d\u0443)";
    return '<div class="bar-group" title="' + escapeHtml(tip) + '"><div class="bar-wrap">' +
      '<div class="bar plan" style="height:' + ph + '%"></div>' +
      '<div class="bar fact" style="height:' + fh + '%"></div></div>' +
      '<span class="bar-label">' + escapeHtml(pt.label) + "</span></div>";
  }).join("");
  var last = points[points.length - 1];
  var deltaInfo = computeMetricDelta(metric, last.fact, last.plan);
  var delta = deltaInfo.rawPct.toFixed(1);
  var deltaCls = deltaInfo.deltaCls;
  var note = metric
    ? "\u041f\u0440\u043e\u0434\u0443\u043a\u0442 \u00ab" + prodName + "\u00bb \u00b7 \u043c\u0435\u0442\u0440\u0438\u043a\u0430 \u00ab" + metric.name + "\u00bb. " + dmeta.noteMetric
    : dmeta.noteAgg;
  var promptHtml = metric ? "" :
    '<div class="chart-prompt"><strong>\u0412\u044b\u0431\u0435\u0440\u0438\u0442\u0435 \u043c\u0435\u0442\u0440\u0438\u043a\u0443</strong> \u043d\u0430 \u043f\u0438\u0440\u0430\u043c\u0438\u0434\u0435 \u2014 \u0437\u0434\u0435\u0441\u044c \u043f\u043e\u044f\u0432\u0438\u0442\u0441\u044f \u043f\u043b\u0430\u043d/\u0444\u0430\u043a\u0442 \u043f\u043e \u043a\u043e\u043d\u043a\u0440\u0435\u0442\u043d\u043e\u043c\u0443 \u043f\u043e\u043a\u0430\u0437\u0430\u0442\u0435\u043b\u044e \u0438 \u043e\u0442\u043a\u0440\u043e\u0435\u0442\u0441\u044f \u043f\u0430\u0441\u043f\u043e\u0440\u0442.' +
    '<div class="chart-scope">\u0421\u0435\u0439\u0447\u0430\u0441: \u0441\u0432\u043e\u0434\u043d\u044b\u0439 \u043e\u0440\u0438\u0435\u043d\u0442\u0438\u0440 \u043f\u043e \u00ab' + escapeHtml(prodName) + "\u00bb</div></div>";
  root.innerHTML =
    promptHtml +
    '<div class="chart-title">' + escapeHtml(title) + "</div>" +
    '<div class="chart-sub">' + escapeHtml(sub) + "</div>" +
    '<div class="kpi-row">' +
    '<div class="kpi-box"><div class="k-label">' + escapeHtml(planTitle) + " (\u043f\u043e\u0441\u043b.)</div><div class=\"k-val\">" + escapeHtml(formatMetricValue(last.plan, metric ? metric.units : "", metric)) + "</div></div>" +
    '<div class="kpi-box"><div class="k-label">' + escapeHtml(factTitle) + " (\u043f\u043e\u0441\u043b.)</div><div class=\"k-val\">" + escapeHtml(formatMetricValue(last.fact, metric ? metric.units : "", metric)) +
    '</div><div class="k-delta ' + deltaCls + '"' + (deltaInfo.lower ? ' title="\u043c\u0435\u043d\u044c\u0448\u0435 \u043f\u043b\u0430\u043d\u0430 \u2014 \u043b\u0443\u0447\u0448\u0435"' : "") + ">" + deltaInfo.deltaSign + delta + "% " + escapeHtml(dmeta.deltaLabel) + "</div></div></div>" +
    '<div class="chart-legend"><span><span class="dot dot-plan"></span> ' + escapeHtml(planTitle) + '</span><span><span class="dot dot-fact"></span> ' + escapeHtml(factTitle) + "</span></div>" +
    '<div class="chart-bars">' + bars + "</div>" +
    '<div class="chart-note">' + escapeHtml(note) + "</div>";
}

function renderAll() {
  renderAppShell();
  if (state.appView !== "workspace") return;
  renderBreadcrumbs();
  renderTree();
  renderPyramid();
  renderPassport();
  renderCharts();
  if (state.guideOpen) renderGuide();
}

function escapeHtml(s) {
  if (s == null || s === "") return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

document.getElementById("passportClose").addEventListener("click", function () {
  state.passportOpen = false;
  renderPassport();
});
document.getElementById("passportOverlay").addEventListener("click", function () {
  state.passportOpen = false;
  renderPassport();
});
var pyramidPanelActions = document.getElementById("pyramidPanelActions");
if (pyramidPanelActions) {
  pyramidPanelActions.addEventListener("click", function (e) {
    var btn = e.target.closest("[data-view-mode]");
    if (!btn || !isLeafProduct(state.selectedProduct)) return;
    var mode = btn.getAttribute("data-view-mode");
    if (mode === "description") {
      state.centerView = "description";
    } else {
      state.centerView = "metrics";
      state.metricsLayout = mode;
      if (mode !== "tree") state.graphFocusMetricId = null;
    }
    state.passportOpen = false;
    renderAll();
  });
}
document.addEventListener("keydown", function (e) {
  if (e.key !== "Escape") return;
  if (state.passportOpen) {
    state.passportOpen = false;
    renderPassport();
  } else if (state.centerView === "description") {
    state.centerView = "metrics";
    renderAll();
  } else if (state.guideOpen) {
    closeGuide();
  }
});

document.getElementById("btnGuideCatalog").addEventListener("click", function () {
  openGuide();
});
document.getElementById("guideClose").addEventListener("click", closeGuide);
document.getElementById("guideOverlay").addEventListener("click", closeGuide);
document.getElementById("guidePanel").addEventListener("click", function (e) {
  e.stopPropagation();
});

document.getElementById("headerNav").addEventListener("click", function (e) {
  var btn = e.target.closest("[data-app-view]");
  if (!btn) return;
  setAppView(btn.getAttribute("data-app-view"));
});
document.getElementById("headerBrand").addEventListener("click", function () {
  setAppView("home");
});

document.addEventListener("click", function (e) {
  var catalogBtn = e.target.closest("[data-open-catalog]");
  if (catalogBtn) {
    e.preventDefault();
    openGuide();
    return;
  }
  var link = e.target.closest("[data-goto-metric]");
  if (!link) return;
  e.preventDefault();
  e.stopPropagation();
  var mid = link.getAttribute("data-goto-metric");
  if (mid) navigateToMetric(mid);
});

function buildMetricBackdrop() {
  var bg = document.getElementById("metricBackdrop");
  if (!bg || bg.dataset.ready) return;
  bg.dataset.ready = "1";
  var scene = document.createElement("div");
  scene.className = "backdrop-scene";
  var center = document.createElement("div");
  center.className = "centerline";
  scene.appendChild(center);
  var rows = [
    { top: 8, x0: "12vw", dur: 7.2, del: 0, op: 0.85 },
    { top: 20, x0: "78vw", dur: 8.6, del: 0.9, op: 0.6 },
    { top: 33, x0: "30vw", dur: 6.4, del: 1.7, op: 0.75 },
    { top: 46, x0: "88vw", dur: 9.4, del: 0.4, op: 0.55 },
    { top: 59, x0: "20vw", dur: 7.8, del: 2.3, op: 0.7 },
    { top: 72, x0: "70vw", dur: 6.9, del: 1.2, op: 0.82 },
    { top: 85, x0: "38vw", dur: 8.1, del: 2.9, op: 0.55 }
  ];
  rows.forEach(function (row) {
    var tr = document.createElement("div");
    tr.className = "bgtrack";
    tr.style.top = row.top + "%";
    var pin = document.createElement("div");
    pin.className = "bgpin";
    pin.style.setProperty("--x0", row.x0);
    pin.style.setProperty("--dur", row.dur + "s");
    pin.style.setProperty("--del", row.del + "s");
    pin.style.setProperty("--op", row.op);
    tr.appendChild(pin);
    scene.appendChild(tr);
  });
  bg.appendChild(scene);
}

setAppView("home");
buildMetricBackdrop();

var productSearchEl = document.getElementById("productSearch");
if (productSearchEl) {
  productSearchEl.addEventListener("input", function () {
    state.productSearch = productSearchEl.value;
    renderTree();
  });
}

var metricGraphResizeTimer;
window.addEventListener("resize", function () {
  if (state.metricsLayout !== "tree" || !isLeafProduct(state.selectedProduct)) return;
  clearTimeout(metricGraphResizeTimer);
  metricGraphResizeTimer = setTimeout(function () {
    var root = document.getElementById("pyramidRoot");
    if (!root) return;
    drawMetricGraphEdges(root, buildProductGraphEdges(getProductMetricMap(state.selectedProduct)), state.graphFocusMetricId);
  }, 120);
});
</script>
